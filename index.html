// ===== DRAG INTERACTION =====
var dragState = null;

function onCardClick(card, cardEl) {
  if (clickModeCard === card) {
    cancelClickMode();
    return;
  }
  cancelClickMode();
  clickModeCard = card;
  clickModeCardEl = cardEl;
  cardEl.classList.add("click-selected");
  document.getElementById("click-overlay").classList.add("active");
  var skills = [];
  for (var i = 0; i < card.skills.length; i++) {
    if (!card.skills[i].isPassive) skills.push(card.skills[i]);
  }
  renderSkillFan(window.innerWidth / 2, window.innerHeight / 2, skills);
  var overlay = document.getElementById("drag-overlay");
  overlay.classList.add("active");
  overlay.style.pointerEvents = "auto";
}

function onFanSkillClick(e) {
  if (!clickModeCard) return;
  var fanEls = document.getElementById("skill-fan").children;
  for (var i = 0; i < fanEls.length; i++) {
    var rect = fanEls[i].getBoundingClientRect();
    if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
      var skills = [];
      for (var j = 0; j < clickModeCard.skills.length; j++) {
        if (!clickModeCard.skills[j].isPassive) skills.push(clickModeCard.skills[j]);
      }
      if (i < skills.length) {
        game.player.useSkill(clickModeCard, skills[i]);
        cancelClickMode();
        renderAll();
        if (game.player && game.player.cardList.length === 0 && !game.isOver) {
          setTimeout(function() { game.nextRound(); renderAll(); }, 400);
        }
      }
      return;
    }
  }
}

function onCardDragStart(e, card, cardEl) {
  e.preventDefault();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;

  var skills = [];
  for (var i = 0; i < card.skills.length; i++) {
    if (!card.skills[i].isPassive) skills.push(card.skills[i]);
  }

  if (skills.length === 0) {
    toast("该卡牌没有可用技能");
    return;
  }

  dragState = {
    card: card,
    cardEl: cardEl,
    startX: clientX,
    startY: clientY,
    curX: clientX,
    curY: clientY,
    active: true,
    selectedSkillIdx: -1,
    skills: skills
  };

  cardEl.classList.add("dragging");

  var overlay = document.getElementById("drag-overlay");
  overlay.classList.add("active");
  overlay.style.pointerEvents = "auto";

  renderSkillFan(clientX, clientY, skills);
  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup", onDragEnd);
  document.addEventListener("touchmove", onDragMove, { passive: false });
  document.addEventListener("touchend", onDragEnd);
}

function onDragMove(e) {
  if (!dragState || !dragState.active) return;
  e.preventDefault();
  var clientX = e.touches ? e.touches[0].clientX : e.clientX;
  var clientY = e.touches ? e.touches[0].clientY : e.clientY;
  dragState.curX = clientX;
  dragState.curY = clientY;

  var fanEls = document.getElementById("skill-fan").children;
  var nearestIdx = -1;
  for (var i = 0; i < fanEls.length; i++) {
    var rect = fanEls[i].getBoundingClientRect();
    if (clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom) {
      nearestIdx = i;
      break;
    }
  }
  if (dragState.selectedSkillIdx !== nearestIdx) {
    if (dragState.selectedSkillIdx >= 0 && fanEls[dragState.selectedSkillIdx]) {
      fanEls[dragState.selectedSkillIdx].style.borderColor = "#4a4a6e";
      fanEls[dragState.selectedSkillIdx].style.transform = "translate(-50%,0)";
      fanEls[dragState.selectedSkillIdx].style.background = "var(--skill-pill-bg, #2a2a3e)";
      fanEls[dragState.selectedSkillIdx].style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)";
      fanEls[dragState.selectedSkillIdx].style.zIndex = "10";
    }
    dragState.selectedSkillIdx = nearestIdx;
    if (nearestIdx >= 0 && fanEls[nearestIdx]) {
      fanEls[nearestIdx].style.borderColor = "#ffd700";
      fanEls[nearestIdx].style.transform = "translate(-50%,0) scale(1.1)";
      fanEls[nearestIdx].style.background = "rgba(232,184,109,0.25)";
      fanEls[nearestIdx].style.boxShadow = "0 0 24px rgba(232,184,109,0.5), 0 4px 16px rgba(0,0,0,0.4)";
      fanEls[nearestIdx].style.zIndex = "20";
    }

    var rbar = document.getElementById("drag-resource-bar");
    if (nearestIdx >= 0 && dragState.skills[nearestIdx]) {
      var s = dragState.skills[nearestIdx];
      var p = game.player;
      var costUp = p.hasDeBuff("技能消耗+1");
      var pendingVeg = 0, pendingMeat = 0, pendingWater = 0;
      for (var qi = 0; qi < p.skillQueue.length; qi++) {
        pendingVeg += p.skillQueue[qi].vegCost;
        pendingMeat += p.skillQueue[qi].meatCost;
        pendingWater += p.skillQueue[qi].waterCost;
      }
      var totalVeg = s.vegCost + (costUp && s.vegCost > 0 ? 1 : 0) + pendingVeg;
      var totalMeat = s.meatCost + (costUp && s.meatCost > 0 ? 1 : 0) + pendingMeat;
      var totalWater = s.waterCost + (costUp && s.waterCost > 0 ? 1 : 0) + pendingWater;
      var vegOk = p.vegetarian >= totalVeg;
      var meatOk = p.meat >= totalMeat;
      var waterOk = p.water >= totalWater;
      var vegTxt = '🌿' + p.vegetarian + '/' + s.vegCost + (pendingVeg ? '+' + pendingVeg : '');
      var meatTxt = '🥩' + p.meat + '/' + s.meatCost + (pendingMeat ? '+' + pendingMeat : '');
      var waterTxt = '💧' + p.water + '/' + s.waterCost + (pendingWater ? '+' + pendingWater : '');
      rbar.innerHTML = '<span class="' + (vegOk ? 'res-enough' : 'res-short') + '">' + vegTxt + '</span>' +
        '<span class="' + (meatOk ? 'res-enough' : 'res-short') + '">' + meatTxt + '</span>' +
        '<span class="' + (waterOk ? 'res-enough' : 'res-short') + '">' + waterTxt + '</span>';
      rbar.classList.add("show");
    } else {
      rbar.classList.remove("show");
    }
    var ttp = document.getElementById("skill-desc-tooltip");
    if (settings.desc === "concise" && nearestIdx >= 0 && dragState.skills[nearestIdx]) {
      ttp.textContent = dragState.skills[nearestIdx].desc || "";
      ttp.classList.add("show");
    } else {
      ttp.classList.remove("show");
    }
  }
}

function onDragEnd(e) {
  if (!dragState) return;
  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", onDragEnd);
  document.removeEventListener("touchmove", onDragMove);
  document.removeEventListener("touchend", onDragEnd);

  var overlay = document.getElementById("drag-overlay");
  overlay.classList.remove("active");
  overlay.style.pointerEvents = "none";

  if (dragState.cardEl) dragState.cardEl.classList.remove("dragging");

  if (dragState.selectedSkillIdx >= 0 && dragState.selectedSkillIdx < dragState.skills.length) {
    var skill = dragState.skills[dragState.selectedSkillIdx];
    game.player.useSkill(dragState.card, skill);
    flashCard(dragState.cardEl);
  }

  document.getElementById("skill-fan").innerHTML = "";
  document.getElementById("drag-resource-bar").classList.remove("show");
  dragState = null;
  renderAll();

  if (game.player && game.player.cardList.length === 0 && !game.isOver) {
    setTimeout(function() { game.nextRound(); renderAll(); }, 400);
  }
}

function renderSkillFan(cx, cy, skills) {
  var fan = document.getElementById("skill-fan");
  fan.innerHTML = "";
  var cx_fixed = window.innerWidth / 2;
  var cy_fixed = window.innerHeight / 2;
  var isMobile = window.innerWidth < 768;
  var itemW = isMobile ? 160 : 360, itemH = isMobile ? (settings.desc === "concise" ? 52 : 72) : (settings.desc === "concise" ? 80 : 130);
  var gap = isMobile ? 12 : 24, rowGap = isMobile ? 8 : 12;
  var nameFont = isMobile ? "15px" : "22px", costFont = isMobile ? "12px" : "16px", descFont = isMobile ? "11px" : "15px";
  var cols = Math.min(skills.length, 2);
  var rows = Math.ceil(skills.length / cols);
  var totalW = cols * itemW + (cols - 1) * gap;
  var totalH = rows * itemH + (rows - 1) * rowGap;
  var startX = cx_fixed - totalW / 2;
  var startY = cy_fixed - totalH / 2;
  for (var i = 0; i < skills.length; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var sx = startX + col * (itemW + gap) + itemW / 2;
    var sy = startY + row * (itemH + rowGap);

    var item = document.createElement("div");
    item.className = "skill-fan-item visible";
    item.style.position = "absolute";
    item.style.left = sx + "px";
    item.style.top = sy + "px";
    item.style.width = itemW + "px";
    item.style.minHeight = itemH + "px";
    item.style.borderRadius = isMobile ? "10px" : "14px";
    item.style.background = "var(--skill-pill-bg, #2a2a3e)";
    item.style.border = "3px solid #4a4a6e";
    item.style.display = "flex";
    item.style.flexDirection = "column";
    item.style.alignItems = "flex-start";
    item.style.justifyContent = "center";
    item.style.fontSize = "14px";
    item.style.fontWeight = "700";
    item.style.color = "#e0d7c6";
    item.style.textAlign = "left";
    item.style.transform = "translate(-50%,0)";
    item.style.transition = "transform 0.15s, border-color 0.15s, background 0.15s, box-shadow 0.15s";
    item.style.pointerEvents = "none";
    item.style.zIndex = "10";
    item.style.lineHeight = "1.35";
    item.style.padding = isMobile ? "6px 10px" : "10px 14px";
    item.style.overflow = "hidden";
    item.style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)";

    var s = skills[i];
    var costStr = "";
    if (s.vegCost) costStr += "🌿" + s.vegCost + " ";
    if (s.meatCost) costStr += "🥩" + s.meatCost + " ";
    if (s.waterCost) costStr += "💧" + s.waterCost;
    if (!s.vegCost && !s.meatCost && !s.waterCost) costStr = "免费";
    item.innerHTML = '<span style="font-size:' + nameFont + ';font-weight:700;color:#e8b86d">' + s.name + '</span>' +
      '<span style="font-size:' + costFont + ';color:#a09888">' + costStr + '</span>' +
      (settings.desc === "full" ? '<span style="font-size:' + descFont + ';color:#c0b8a8;margin-top:4px">' + (s.desc || '') + '</span>' : '');
    fan.appendChild(item);
  }
}

function flashCard(cardEl) {
  if (!cardEl) return;
  cardEl.style.transition = "transform 0.2s";
  cardEl.style.transform = "translateY(-20px)";
  setTimeout(function() { cardEl.style.transform = ""; }, 200);
}

function showFloatingNumber(container, side, text, type) {
  var el = document.createElement("div");
  el.className = "floating-number " + type;
  el.textContent = text;
  el.style.position = "absolute";
  el.style.top = (40 + Math.random() * 10) + "%";
  el.style.left = side === "left" ? "25%" : "75%";
  container.appendChild(el);
  var cleanup = function() { if (el.parentNode) el.parentNode.removeChild(el); };
  setTimeout(cleanup, 1500);
}

function switchPanel(name) {
  if (name !== "battle") cancelClickMode();
  var panels = document.querySelectorAll(".panel");
  for (var i = 0; i < panels.length; i++) panels[i].classList.remove("active");
  var panel = document.getElementById("panel-" + name);
  if (panel) panel.classList.add("active");

  var navItems = document.querySelectorAll(".nav-item");
  for (var j = 0; j < navItems.length; j++) navItems[j].classList.remove("active");
  var navItem = document.querySelector('.nav-item[data-panel="' + name + '"]');
  if (navItem) navItem.classList.add("active");

  closeSidebar();
  try { renderAll(); } catch(e) {}
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("hamburger").classList.remove("active");
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._toastTimer);
  t._toastTimer = setTimeout(function() { t.classList.remove("show"); }, 2000);
}

function confirm(title, msg, onConfirm) {
  var modal = document.getElementById("modal-confirm");
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-message").textContent = msg;
  modal.classList.add("active");
  var btn = document.getElementById("modal-confirm-btn");
  var cancel = document.getElementById("modal-cancel");
  var close = function() {
    modal.classList.remove("active");
    btn.onclick = null;
    cancel.onclick = null;
  };
  btn.onclick = function() { close(); onConfirm(); };
  cancel.onclick = close;
}

function runInteractionTests() {
  var passed = 0, failed = 0, errors = [];
  function ok(cond, msg) { if (cond) passed++; else { failed++; errors.push(msg); } }

  var saveBak = null, deckBak = null, playerBak = null, bossBak = null, isOverBak = false;
  try {
    saveBak = localStorage.getItem("h5game_save");
    deckBak = localStorage.getItem("h5game_deck");
  } catch(e) {}
  if (game.player) {
    playerBak = game.player; bossBak = game.boss;
    isOverBak = game.isOver;
  }

  localStorage.removeItem("h5game_deck");
  localStorage.removeItem("h5game_save");
  game.player = null; game.boss = null; game.isOver = true; game.isExecuting = false;

  initDeckBuilder();
  switchPanel("deck");

  var btn = document.getElementById("btn-start-game");
  var cnt = document.getElementById("deck-count");
  var grid = document.getElementById("deck-card-grid");

  ok(btn && btn.disabled === true, "01 initial: btn disabled");

  var presetBtn = document.querySelector(".preset-btn[data-preset='qiqiao']");
  if (presetBtn) {
    presetBtn.dispatchEvent(new Event("click", { bubbles: true }));
    var selCount = grid.querySelectorAll(".deck-card-item.selected").length;
    ok(selCount === 8, "02 preset: selected=" + selCount);
    ok(btn && btn.disabled === false, "03 preset: btn enabled");
    ok(cnt && cnt.textContent === "8", "04 preset: count=8");
  } else { failed++; errors.push("02 preset: .preset-btn not found"); }

  var selItems = grid.querySelectorAll(".deck-card-item.selected");
  if (selItems.length >= 8) {
    selItems[7].dispatchEvent(new Event("click", { bubbles: true }));
    var sc2 = grid.querySelectorAll(".deck-card-item.selected").length;
    ok(sc2 === 7, "05 unselect: selected=" + sc2);
    ok(btn && btn.disabled === true, "06 unselect: btn disabled");
  } else { failed++; errors.push("05 unselect: not enough selected"); }

  if (presetBtn) presetBtn.dispatchEvent(new Event("click", { bubbles: true }));
  btn.dispatchEvent(new Event("click", { bubbles: true }));
  ok(game.player !== null, "07 start: player exists");
  ok(game.player.cardList.length === 4, "08 start: hand=" + game.player.cardList.length);
  ok(document.getElementById("hand-cards").children.length === 4, "09 start: DOM hand=4");
  ok(document.getElementById("panel-battle").classList.contains("active"), "10 start: battle active");
  var bossLabel = document.getElementById("boss-avatar-label");
  ok(bossLabel && bossLabel.textContent === game.boss.name, "11 boss label: " + (bossLabel ? bossLabel.textContent : "null"));
  setTimeout(function() {
    game.saveGame();
    var raw = localStorage.getItem("h5game_save");
    ok(raw !== null, "12 save: storage ok");
    var preHand = game.player.cardList.length;
    game.loadGame();
    ok(game.player.cardList.length > 0, "13 load: hand=" + game.player.cardList.length);

    // --- settings tests (14-20) ---
    switchPanel("system");
    initSettings();
    ok(settings.control === "drag" || settings.control === "click", "14 settings control: " + settings.control);
    ok(settings.desc === "full" || settings.desc === "concise", "14 settings desc: " + settings.desc);
    var ctrlBtns = document.getElementById("setting-control").querySelectorAll(".toggle-btn");
    ctrlBtns[1].dispatchEvent(new Event("click", { bubbles: true }));
    ok(settings.control === "click", "15 toggle click mode: " + settings.control);
    ok(localStorage.getItem("h5game_control") === "click", "15 localStorage click: " + localStorage.getItem("h5game_control"));
    var descBtns = document.getElementById("setting-desc").querySelectorAll(".toggle-btn");
    descBtns[1].dispatchEvent(new Event("click", { bubbles: true }));
    ok(settings.desc === "concise", "16 toggle concise: " + settings.desc);
    ctrlBtns[0].dispatchEvent(new Event("click", { bubbles: true }));
    ok(settings.control === "drag", "17 toggle back drag: " + settings.control);

    // --- filter tests (18-23) ---
    switchPanel("deck");
    ok(typeof PRESETS.chunhui !== "undefined", "18 chunhui preset exists");
    ok(PRESETS.chunhui.cards.length === 8, "18 chunhui cards: " + PRESETS.chunhui.cards.length);

    // select chunhui preset
    var chBtn = document.querySelector(".preset-btn[data-preset='chunhui']");
    if (chBtn) chBtn.dispatchEvent(new Event("click", { bubbles: true }));
    var selGrid = document.getElementById("deck-card-grid");
    ok(selGrid.querySelectorAll(".deck-card-item.selected").length === 8, "19 chunhui select: 8 selected");

    // filter buttons exist
    var fBar = document.getElementById("deck-filter-bar");
    ok(fBar.querySelectorAll(".filter-btn").length === 7, "20 filter btn count: " + fBar.querySelectorAll(".filter-btn").length);

    // click "猛兽" filter
    var fBtns = fBar.querySelectorAll(".filter-btn");
    fBtns[0].click();
    ok(fBtns[0].classList.contains("active"), "21 click 猛兽: " + fBtns[0].classList.contains("active"));

    // cancel filter
    fBtns[0].click();
    ok(selGrid.querySelectorAll(".deck-card-item.selected").length === 8, "22 filter keeps selection");

    // clear filter state
    fBar.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    var items = selGrid.querySelectorAll(".deck-card-item");
    for (var gj = 0; gj < items.length; gj++) items[gj].style.display = "";

    // restore to original for clean state
    if (isMobileDevice()) {
      settings.control = "click"; settings.desc = "concise";
    } else {
      settings.control = "drag"; settings.desc = "full";
    }
    localStorage.removeItem("h5game_control");
    localStorage.removeItem("h5game_desc");
    applySettingsUI();
    switchPanel("deck");

    try {
      if (deckBak !== null) localStorage.setItem("h5game_deck", deckBak); else localStorage.removeItem("h5game_deck");
      if (saveBak !== null) localStorage.setItem("h5game_save", saveBak); else localStorage.removeItem("h5game_save");
    } catch(e) {}
    if (playerBak) { game.player = playerBak; game.boss = bossBak; game.isOver = isOverBak; }
    switchPanel("deck");

    console.log("=== INTERACTION TESTS ===");
    console.log("Passed: " + passed + "/" + (passed + failed));
    if (errors.length > 0) { console.error("Failures:"); for (var i = 0; i < errors.length; i++) console.error("  - " + errors[i]); }
    else console.log("All interaction tests passed!");
  }, 600);
}

function runLogicTests() {
  var passed = 0, failed = 0, errs = [];
  function ok(cond, msg) { if (cond) passed++; else { failed++; errs.push(msg); } }

  var saveBak = null, deckBak = null, playerBak = null, bossBak = null, isOverBak = false;
  try { saveBak = localStorage.getItem("h5game_save"); deckBak = localStorage.getItem("h5game_deck"); } catch(e) {}
  if (game.player) { playerBak = game.player; bossBak = game.boss; isOverBak = game.isOver; }
  localStorage.removeItem("h5game_deck"); localStorage.removeItem("h5game_save");
  game.player = null; game.boss = null; game.isOver = true; game.isExecuting = false;

  // --- setup: create test players ---
  var p1 = new Player("测试A", false, 5000);
  var p2 = new Player("测试B", false, 5000);

  // === DAMAGE (01-06) ===
  p1.criticalRate = 0; p1.criticalDamage = 150; p2.defendRate = 0;
  p2.buffs = []; p2.debuffs = []; p1.buffs = []; p1.debuffs = [];
  var r = p1.calcDamage(100, p2, 0);
  ok(r.dmg > 0, "01 damage: dmg=" + r.dmg);

  p1.criticalRate = 100;
  r = p1.calcDamage(100, p2, 0);
  ok(r.isCrit === true, "02 damage crit: isCrit=" + r.isCrit);
  ok(r.dmg === 150, "02 damage crit: dmg=" + r.dmg + " expected 150");
  p1.criticalRate = 0;

  p1.addBuff(makeBuff("test_rampage", true, 3, "", {damage:function(d){return Math.floor(d*1.15);}}));
  r = p1.calcDamage(100, p2, 0);
  ok(r.dmg >= 113 && r.dmg <= 117, "03 damage rampup: dmg=" + r.dmg);
  p1.buffs = [];

  p2.addBuff(makeBuff("test_def", true, 1, "", {defend:function(d){return Math.floor(d*0.8);}}));
  r = p1.calcDamage(100, p2, 0);
  ok(r.dmg <= 80, "04 damage enemy defend: dmg=" + r.dmg);
  p2.buffs = [];

  p2.defendRate = 100;
  r = p1.calcDamage(100, p2, 0);
  ok(r.dmg === 40, "05 damage defend 60%: dmg=" + r.dmg);
  p2.defendRate = 0;

  p2._hp = 1; p1.criticalRate = 100;
  r = p1.calcDamage(100, p2, 0);
  p2.hp -= r.dmg;
  ok(p2.hp >= 0, "06 damage clamp: hp=" + p2.hp);

  // === HEAL (07-09) ===
  p1._hp = 1000; p1.buffs = []; p1.debuffs = [];
  var h = p1.calcCure(400);
  ok(h === 400, "07 heal base: " + h);
  p1.addBuff(makeBuff("", true, 2, "", {cure:function(c){return Math.floor(c*1.2);}}));
  h = p1.calcCure(400);
  ok(h === 480, "08 heal buff: " + h);
  p1.buffs = [];
  p1.addBuff(makeBuff("", false, 2, "", {cure:function(c){return Math.floor(c*0.8);}}));
  h = p1.calcCure(400);
  ok(h === 320, "09 heal debuff: " + h);

  // === DRAW (10-13) ===
  var defs = ALL_PLAYER_CARDS.slice(0, 4);
  p1.initCardStack(defs);
  ok(p1.cardStack.length >= 8, "10 draw deck: " + p1.cardStack.length);
  p1.buffs = [makeBuff("", true, 1, "", {draw:function(c){return c+1;}})];
  var cards = 4; for (var i = 0; i < p1.buffs.length; i++) cards = p1.buffs[i].drawCardBuffEffect(cards);
  ok(cards === 5, "11 draw buff +1: " + cards);
  p1.buffs = [];
  p1.debuffs = [makeBuff("", false, 2, "", {draw:function(c){return Math.max(c-1,1);}})];
  cards = 4; for (var j = 0; j < p1.debuffs.length; j++) cards = p1.debuffs[j].drawCardBuffEffect(cards);
  ok(cards === 3, "12 draw debuff -1: " + cards);
  p1.debuffs = [];
  p1.cardStack = []; p1.usedCardStack = [createCard(defs[0])];
  p1.drawCard();
  ok(p1.cardList.length === 1, "13 draw reshuffle: cardList=" + p1.cardList.length);

  // === BUFF (14-18) ===
  p1.buffs = [];
  p1.addBuff(makeBuff("同名", true, 1, ""));
  p1.addBuff(makeBuff("同名", true, 3, ""));
  ok(p1.buffs[0].lastRound === 3, "14 buff same name max: " + p1.buffs[0].lastRound);
  p1.buffs = [makeBuff("tick", true, 2, "")];
  var bf = p1.buffs[0]; bf.lastRound--; if (bf.lastRound <= 0 && !bf.isPermanent) p1.buffs = p1.buffs.filter(function(x){return x.lastRound>0||x.isPermanent;});
  ok(p1.buffs.length === 1 && p1.buffs[0].lastRound === 1, "15 buff tick: len=" + p1.buffs.length + " lr=" + (p1.buffs[0]?p1.buffs[0].lastRound:"-"));
  bf.lastRound--; if (bf.lastRound <= 0 && !bf.isPermanent) p1.buffs = p1.buffs.filter(function(x){return x.lastRound>0||x.isPermanent;});
  ok(p1.buffs.length === 0, "16 buff expire: len=" + p1.buffs.length);
  p1.buffs = [];
  var mp = makeMoonPhaseBuff();
  p1.addBuff(mp);
  mp.lastRound--; if (mp.lastRound <= 0 && !mp.isPermanent) p1.buffs = p1.buffs.filter(function(x){return x.lastRound>0||x.isPermanent;});
  ok(p1.buffs.length === 1, "17 buff permanent: len=" + p1.buffs.length);
  p1.buffs = [makeBuff("nodef", true, 1, "")];
  r = p1.calcDamage(100, p2, 0);
  ok(r.dmg > 0, "18 buff default pass: dmg=" + r.dmg);

  // === RESOURCE (19-23) ===
  var p3 = new Player("测资", false, 5000);
  p3.getResources();
  ok(p3.vegetarian === 4 && p3.meat === 3 && p3.water === 4, "19 res gather Lv1: v=" + p3.vegetarian + " m=" + p3.meat + " w=" + p3.water);
  p3._veg = 1; p3._vegExp = 0; p3.vegetarian_level = 1;
  p3.vegetarian_exp = 10;
  ok(p3.vegetarian_level === 2, "20 res levelup: lv=" + p3.vegetarian_level + " exp=" + p3.vegetarian_exp);
  p3._vegExp = 0; p3.vegetarian_level = 1;
  p3.vegetarian_exp = 15;
  ok(p3.vegetarian_level === 2 && p3.vegetarian_exp === 5, "21 res overflow: lv=" + p3.vegetarian_level + " exp=" + p3.vegetarian_exp);
  p3.vegetarian_level = 2; p3.vegetarian_exp = 0;
  p3.vegetarian_exp = 100; // Lv2(20) + Lv3(40) + Lv4(40/60?)
  // Actually: Lv2→3(20exp), Lv3→4(40exp), Lv4→5(60exp) = 120exp total to Lv5
  // With 100exp: Lv2→Lv3(-20), Lv3→Lv4(-40) = 40exp left at Lv4 (need 60 to Lv5)
  ok(p3.vegetarian_level === 4, "21b seq levelup lv: " + p3.vegetarian_level + " exp=" + p3.vegetarian_exp);
  ok(p3.vegetarian_exp > 0 && p3.vegetarian_exp < 60, "21b seq levelup exp: " + p3.vegetarian_exp);
  p3.debuffs = [makeBuff("技能消耗+1", false, 1, "")];
  var ts = SKILL_DEFS["虎啸"](1, 1);
  ok(p3.isResEnough(ts) === false, "22 res costUp: enough=" + p3.isResEnough(ts));
  p3.vegetarian = -10;
  ok(p3.vegetarian === 0, "23 res clamp zero: " + p3.vegetarian);

  // === SKILL EXECUTION (24-27) ===
  var skillAff = SKILL_DEFS["利爪挥击"](1, 1);
  p3._veg = 0; p3._meat = 0; p3._wat = 0; p3.debuffs = [];
  p3.skillQueue = [skillAff];
  var tri = p3.isResEnough(p3.skillQueue[0]);
  ok(tri === false, "24 skill queue unafford: skill stays");
  p3.skillQueue = [SKILL_DEFS["月相"](1, 1)];
  var pass = p3.skillQueue[0].isPassive;
  ok(pass === true, "25 skill passive: " + pass);
  if (pass) p3.skillQueue.shift();
  ok(p3.skillQueue.length === 0, "25 skill passive remove: len=" + p3.skillQueue.length);
  p3._veg = 100; p3._meat = 100; p3._wat = 100;
  var sigSkill = SKILL_DEFS["虎啸"](1, 1);
  ok(p3.isResEnough(sigSkill) === true, "26 skill affordable: " + p3.isResEnough(sigSkill));
  p3._hp = 1; p2._critR = 0; p2._critD = 150;
  var dr = p3.calcDamage(100, p2, 0);
  p2._hp = 1; p2._hp -= dr.dmg;
  ok(p2.hp <= 0, "27 skill kill: hp=" + p2.hp);

  // === MOON (28-30) ===
  p3.buffs = [makeMoonPhaseBuff()];
  ok(p3.moonPhase === 0, "28 moon init: phase=" + p3.moonPhase);
  p3.advanceMoon(2);
  ok(p3.moonPhase === 2, "28 moon advance2: phase=" + p3.moonPhase);
  p3.advanceMoon(2);
  ok(p3.moonPhase === 0, "28 moon wrap: phase=" + p3.moonPhase);
  p3.resetMoon();
  ok(p3.moonPhase === 0, "29 moon reset: phase=" + p3.moonPhase);
  p3.buffs = [];
  ok(p3.moonPhase === 0, "30 moon absent: phase=" + p3.moonPhase);
  ok(p3.moonPhaseName() === "新月", "30 moon name: " + p3.moonPhaseName());

  // === SAVE/LOAD (31-32) ===
  var defs8 = ALL_PLAYER_CARDS.slice(0, 8);
  game.selectedCards = defs8;
  game.startGame(defs8);
  game.saveGame();
  game.player.cardList = []; game.player.cardStack = [];
  game.loadGame();
  ok(game.player.cardList.length > 0, "31 save/load hand: " + game.player.cardList.length);
  ok(game.boss !== null && (game.boss.hp === 8000 || game.boss.hp === 7000), "32 save/load boss: hp=" + (game.boss ? game.boss.hp : "null"));

  // === MANTIS BOSS (33-45) ===
  ok(typeof SKILL_DEFS["收割"] === "function", "33a SKILL has 收割");
  ok(typeof SKILL_DEFS["争农时"] === "function", "33b SKILL has 争农时");
  ok(typeof SKILL_DEFS["麦镰"] === "function", "33c SKILL has 麦镰");
  ok(typeof SKILL_DEFS["雾雨"] === "function", "33d SKILL has 雾雨");
  ok(typeof SKILL_DEFS["雷雨惊"] === "function", "33e SKILL has 雷雨惊");
  ok(typeof SKILL_DEFS["磨爪"] === "function", "33f SKILL has 磨爪");
  ok(typeof SKILL_DEFS["播种"] === "function", "33g SKILL has 播种");
  ok(typeof MantisBoss === "function", "33h MantisBoss class exists");
  ok(MANTIS_BOSS_CARDS.length === 7, "33i MANTIS has " + MANTIS_BOSS_CARDS.length + " cards");

  // test 争农时 baseDmg starts 400
  var springSkill = SKILL_DEFS["争农时"](); springSkill.baseDmg = 400;
  ok(springSkill.baseDmg === 400, "33 争农时 baseDmg init: " + springSkill.baseDmg);

  // test 麦镰 calc
  p3._veg = 5; var short = Math.max(0, 20 - p3.vegetarian); var mult = 1 + short * 0.1;
  ok(Math.floor(300 * mult) > 300, "34 麦镰 短缺作用: baseDmg=" + Math.floor(300 * mult));
  p3._veg = 25;
  ok(Math.floor(300 * (1 + Math.max(0, 20 - p3.vegetarian) * 0.1)) === 300, "35 麦镰 充足无加成");

  // test 雾雨 buffs
  var rainBuff1 = makeBuff("雾雨-攻", true, 2, "", {damage:function(d){return Math.floor(d*1.1);}});
  ok(rainBuff1.damageBuffEffect(100) === 110, "36 雾雨 +10% dmg: " + rainBuff1.damageBuffEffect(100));
  var rainBuff2 = makeBuff("雾雨-防", true, 2, "", {defend:function(d){return Math.floor(d*0.9);}});
  ok(rainBuff2.defendBuffEffect(100) === 90, "37 雾雨 -10% def: " + rainBuff2.defendBuffEffect(100));

  // test 雷雨惊 random times
  var timesCount = 0; for (var ri = 0; ri < 10; ri++) { timesCount += Math.floor(Math.random() * 4) + 3; }
  var avgTimes = timesCount / 10;
  ok(avgTimes >= 3 && avgTimes <= 6, "38 雷雨惊 avg times: " + avgTimes.toFixed(1));

  // test MantisBoss instance
  var mb = new MantisBoss("test", 7000);
  ok(mb instanceof Player, "39 MantisBoss instanceof Player");
  ok(mb.hp === 7000, "40 MantisBoss hp: " + mb.hp);
  ok(mb.name === "test", "41 MantisBoss name: " + mb.name);

  // SmallSnowMan tests
  var ss = new SmallSnowMan("小雪测试", 8000);
  ok(ss instanceof Player, "42 SmallSnowMan instanceof Player");
  ok(typeof ss.useCards === "function", "43 SmallSnowMan has useCards");
  ss.cardList = [createCard(ALL_BOSS_CARDS[4])]; // ChillCard
  ss.skillQueue = [];
  ss.useCards();
  ok(ss.skillQueue.length > 0, "44 SmallSnowMan useCards queues skills: " + ss.skillQueue.length);

  // test createCard with harvestNum
  var harvCard = createCard(MANTIS_BOSS_CARDS[0]);
  var lastSkill = harvCard.skills[harvCard.skills.length - 1];
  ok(lastSkill.name === "收割", "42 harvestNum card last skill: " + lastSkill.name);

  // test 播种 buff + getResources
  p3.buffs = [makeBuff("播种", true, 1, "")];
  ok(p3.hasBuff("播种") === true, "43 播种 buff exists");
  var preVeg = p3.vegetarian;
  p3.getResources();
  ok(p3.vegetarian > preVeg + LEVEL_TO_NUM[p3.vegetarian_level] - 1, "44 getResources +4 with 播种");

  // test 磨爪
  p3._critR = 0; p3._critD = 150;
  var claw = SKILL_DEFS["磨爪"](); claw.exec(p3, p2, {addLog:function(){}});
  ok(p3.criticalRate === 3 && p3.criticalDamage === 158, "45 磨爪 +3 crit +8 critDmg: r=" + p3.criticalRate + " d=" + p3.criticalDamage);

  // === LION/JAY/SQUIRREL (46-55) ===
  ok(typeof SKILL_DEFS["狮吼"] === "function", "46a SKILL has 狮吼");
  ok(typeof SKILL_DEFS["不遗余力"] === "function", "46b SKILL has 不遗余力");
  ok(typeof SKILL_DEFS["贮藏"] === "function", "46c SKILL has 贮藏");
  ok(typeof SKILL_DEFS["筑巢"] === "function", "46d SKILL has 筑巢");
  ok(typeof SKILL_DEFS["掷物伤人"] === "function", "46e SKILL has 掷物伤人");
  ok(typeof SKILL_DEFS["安居"] === "function", "46f SKILL has 安居");

  var lionBuff = makeBuff("狮吼", true, 1, "", {critRate:function(r){return r+30;}});
  ok(lionBuff.critRateBuffEffect(0) === 30, "47 狮吼 critRate +30: " + lionBuff.critRateBuffEffect(0));

  var tiredBuff = makeBuff("疲惫", false, 1, "", {damage:function(d){return Math.floor(d*0.1);}});
  ok(tiredBuff.damageBuffEffect(1000) === 100, "48 疲惫 dmg*0.1: " + tiredBuff.damageBuffEffect(1000));

  var anjuBuff = makeBuff("安居", true, 2, "", {defendRate:function(r){return r+30;}});
  ok(anjuBuff.defendRateBuffEffect(5) === 35, "49 安居 defendRate +30: " + anjuBuff.defendRateBuffEffect(5));

  p3.vegIndicatorActive = true; p3.vegIndicator = 0;
  p3.consumeResourcesExact({vegCost:5, meatCost:0, waterCost:0});
  ok(p3.vegIndicator === 5, "50 indicator accumulate: " + p3.vegIndicator);
  p3.vegetarian_exp = 0;
  var zcSkill = SKILL_DEFS["筑巢"](1,1); zcSkill.exec(p3, p2, {addLog:function(){}});
  ok(p3.vegIndicator === 0, "51 筑巢 consumes all: " + p3.vegIndicator);
  ok(p3.vegetarian_exp > 0, "51 筑巢 gives exp: " + p3.vegetarian_exp);

  p3.vegIndicator = 6;
  var zwSkill = SKILL_DEFS["掷物伤人"](1,1); zwSkill.exec(p3, p2, {addLog:function(){}});
  ok(p3.vegIndicator === 0, "52 掷物伤人 consumes indicator: " + p3.vegIndicator);

  var lionCard = createCard(ALL_PLAYER_CARDS[19]);
  ok(lionCard.name === "狮子", "53 lion card: " + lionCard.name);
  ok(lionCard.skills.length === 3, "53 lion skills: " + lionCard.skills.length);

  var jayCard = createCard(ALL_PLAYER_CARDS[20]);
  ok(jayCard.name === "松鸦", "54 jay card: " + jayCard.name);

  var slaughterDesc = lionCard.skills[lionCard.skills.length-1];
  ok(slaughterDesc.desc.indexOf("1") !== -1, "55 discard desc contains num: " + slaughterDesc.desc);

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("hamburger").addEventListener("click", function() {
    var sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("open");
    document.getElementById("hamburger").classList.toggle("active");
  });

  document.querySelectorAll(".nav-item").forEach(function(item) {
    item.addEventListener("click", function() { switchPanel(item.dataset.panel); });
  });

  var deckClose = document.getElementById("deck-close");
  if (deckClose) deckClose.addEventListener("click", function() { switchPanel("battle"); });

  var statsClose = document.getElementById("stats-close");
  if (statsClose) statsClose.addEventListener("click", function() { switchPanel("battle"); });

  document.getElementById("btn-save").addEventListener("click", function() {
    if (!game.player) { toast("没有游戏数据可保存"); return; }
    game.saveGame();
  });

  document.getElementById("btn-load").addEventListener("click", function() {
    if (!localStorage.getItem("h5game_save")) { toast("没有找到存档"); return; }
    confirm("加载存档", "确定要加载存档吗？当前进度将丢失。", function() { game.loadGame(); });
  });

  document.getElementById("btn-reset").addEventListener("click", function() {
    confirm("重置游戏", "确定要重置所有数据吗？此操作不可撤销。", function() {
      localStorage.removeItem("h5game_save");
      localStorage.removeItem("h5game_deck");
      location.reload();
    });
  });

  document.querySelector(".main-content").addEventListener("click", function(e) {
    var sb = document.getElementById("sidebar");
    if (sb.classList.contains("open") && !e.target.closest(".hamburger")) {
      closeSidebar();
    }
  });

  initDeckBuilder();
  renderChangelog();
  initSettings();

  switchPanel("deck");

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      if (dragState) onDragEnd(e);
      closeSidebar();
    }
  });
