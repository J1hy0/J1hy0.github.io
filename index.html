<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>万类霜天竞自由</title>
<style>
:root {
  --bg: #1a1a2e;
  --sidebar-bg: #16162a;
  --panel-bg: #1e1e32;
  --card-bg: #25253d;
  --card-border: #3a3a5a;
  --text: #e0d7c6;
  --text-muted: #a09888;
  --accent: #6c63ff;
  --accent-gold: #e8b86d;
  --hp-bar: #c44b4b;
  --hp-bar-bg: #3a2020;
  --skill-pill-bg: #2a2a3e;
  --border-color: #3a3a5a;
  --land-color: #8b9a4b;
  --sky-color: #6ba3c7;
  --sea-color: #5b8cb8;
  --success: #4caf50;
  --danger: #e74c3c;
  --warning: #e8b86d;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background:var(--bg); color:var(--text); font-size:20px; }

.app-container { display:flex; width:100%; height:100%; overflow:hidden; }

.sidebar { width:70px; min-width:70px; height:100%; background:var(--sidebar-bg); display:flex; flex-direction:column; align-items:center; padding-top:16px; transition:width 0.3s; overflow:hidden; z-index:100; position:relative; }
.sidebar.open { width:200px; }
.nav-header { font-size:14px; color:var(--text-muted); text-align:center; padding:8px 0; white-space:nowrap; overflow:hidden; width:100%; }
.nav-items { display:flex; flex-direction:column;align-items:center; width:100%; gap:6px; margin-top:8px; }
.nav-item { display:flex; align-items:center; gap:10px; width:100%; padding:14px 0; justify-content:center; cursor:pointer; color:var(--text-muted); font-size:16px; text-decoration:none; transition:0.2s; white-space:nowrap; }
.nav-item:hover { color:var(--accent-gold); background:rgba(255,255,255,0.03); }
.nav-item.active { color:var(--accent-gold); background:rgba(232,184,109,0.08); border-left:3px solid var(--accent-gold); padding-left:5px; }
.nav-item .nav-icon { font-size:24px; flex-shrink:0; }

.main-content { flex:1; height:100%; overflow:hidden; position:relative; display:flex; flex-direction:column; }

.hamburger { display:none; position:absolute; top:12px; left:12px; z-index:200; cursor:pointer; width:36px; height:28px; flex-direction:column; justify-content:space-between; }
.hamburger span { display:block; height:4px; background:var(--text); border-radius:2px; transition:0.3s; }
.hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(6px,6px); }
.hamburger.active span:nth-child(2) { opacity:0; }
.hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(6px,-6px); }

.panel { display:none; width:100%; height:100%; overflow-y:auto; padding:16px; }
.panel.active { display:flex; flex-direction:column; }

/* Battle Panel */
#panel-battle { padding:0; }
.top-bar { display:flex; gap:8px; padding:6px 8px; min-height:0; flex-shrink:0; }
.battle-log { flex:1; background:var(--card-bg); border-radius:8px; padding:8px; max-height:80px; overflow-y:auto; font-size:14px; line-height:1.6; border:1px solid var(--card-border); }
.log-entry { padding:1px 0; }
.log-entry.system { color:var(--text-muted); }
.log-entry.player { color:#e8c46d; }
.log-entry.boss { color:#7eb8da; }
.queue-label { font-size:14px; color:var(--text-muted); margin-bottom:4px; font-weight:600; }
.queue-row { display:flex; flex-wrap:wrap; gap:5px; }
.skill-pill { font-size:13px; padding:5px 12px; border-radius:14px; color:#fff; white-space:normal; font-weight:600; display:inline-flex; flex-direction:column; gap:1px; align-items:flex-start; max-width:180px; }
.skill-pill b { font-size:14px; }
.skill-pill .pill-cost { font-size:12px; opacity:0.85; }
.skill-pill .pill-desc { font-size:12px; opacity:0.7; white-space:normal; word-break:break-all; }
.skill-pill.player { background:var(--accent); color:#fff; }
.skill-pill.boss { background:#c0392b; color:#fff; font-weight:600; }
.skill-pill.boss .pill-desc { opacity:0.9; color:#ffe0e0; }
.skill-pill.boss .pill-cost { opacity:0.9; color:#ffd0d0; }

.middle-area { display:flex; flex:1; min-height:0; padding:4px 8px; gap:8px; align-items:stretch; }
.status-panel { flex:1; background:var(--card-bg); border-radius:8px; padding:10px; overflow:visible; border:1px solid var(--card-border); min-width:0; }
.player-panel { border-left:3px solid var(--accent); }
.boss-panel { border-right:3px solid var(--danger); }

.entity-header { display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap; }
.entity-name { font-size:20px; font-weight:700; }
.entity-name.player-name { color:var(--accent); }
.entity-name.boss-name { color:#e74c3c; }
.entity-buffs { display:flex; gap:3px; flex-wrap:wrap; }

.hp-container { margin:2px 0 8px; }
.hp-label { font-size:14px; color:var(--text-muted); display:block; margin-bottom:2px; }
.hp-bar-outer { height:14px; background:var(--hp-bar-bg); border-radius:7px; overflow:hidden; margin:2px 0; }
.hp-bar-inner { height:100%; background:var(--hp-bar); transition:width 0.4s; }
.hp-text { font-size:14px; color:var(--text); }

.buff-section { margin:4px 0; }
.buff-label { font-size:14px; color:var(--text-muted); display:block; margin-bottom:3px; }
.buff-icons, .debuff-icons { display:flex; flex-wrap:wrap; gap:4px; }
.buff-icon, .debuff-icon { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; position:relative; background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3); }
.debuff-icon { background:rgba(231,76,60,0.15); border-color:rgba(231,76,60,0.3); }
.buff-icon:hover .tooltip, .debuff-icon:hover .tooltip { opacity:1; visibility:visible; }
.tooltip { position:absolute; bottom:120%; left:50%; transform:translateX(-50%); background:#000; color:#fff; font-size:13px; padding:4px 8px; border-radius:4px; white-space:nowrap; opacity:0; visibility:hidden; transition:0.2s; pointer-events:none; z-index:999; }

.resource-stats { margin-top:8px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px 8px; }
.resource-item { min-width:0; overflow:hidden; }
.resource-item-full { grid-column:1 / -1; }
.resource-row { display:flex; justify-content:space-between; align-items:center; font-size:15px; }
.resource-row .label { color:var(--text-muted); }
.resource-row .value { color:var(--text); }
.resource-row .value.crit { color:#f0a060; }
.resource-row .value.defend { color:#6bbf6b; }
.resource-row .value-amount { color:var(--text); font-weight:700; font-size:16px; }
.mini-bar { position:relative; height:10px; background:rgba(255,255,255,0.08); border-radius:5px; margin:2px 0 2px 0; overflow:hidden; }
.mini-bar-fill { height:100%; border-radius:5px; transition:width 0.4s; }
.mini-bar.exp-bar .mini-bar-fill { background: linear-gradient(90deg, #5b8cb8, #7eb8da); }
.mini-bar.crit-bar .mini-bar-fill { background: linear-gradient(90deg, #e8b86d, #f0d090); }
.mini-bar.critdmg-bar .mini-bar-fill { background: linear-gradient(90deg, #e8b86d, #f0d090); }
.mini-bar.defend-bar .mini-bar-fill { background: linear-gradient(90deg, #5cb85c, #6bbf6b); }
.mini-bar-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:9px; color:rgba(255,255,255,0.7); white-space:nowrap; }

.queue-in-panel { margin-top:8px; border-top:1px solid var(--card-border); padding-top:6px; }
.queue-in-panel .queue-label { font-size:13px; margin-bottom:4px; }
.queue-in-panel .queue-row { gap:4px; }
.queue-in-panel .skill-pill { font-size:12px; padding:4px 10px; }

.battlefield { width:120px; min-width:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
.battlefield-avatar { display:flex; flex-direction:column; align-items:center; gap:4px; }
.avatar-circle { width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; }
.player-avatar { background:rgba(108,99,255,0.2); border:2px solid var(--accent); }
.boss-avatar { background:rgba(231,76,60,0.2); border:2px solid var(--danger); }
.avatar-label { font-size:13px; color:var(--text-muted); }
.vs-indicator { font-size:22px; font-weight:700; color:var(--accent-gold); }
.floating-number { position:absolute; font-size:22px; font-weight:700; animation:floatUp 1s forwards; pointer-events:none; z-index:20; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-40px);} }

.bottom-bar { display:flex; gap:8px; padding:8px; align-items:center; border-top:1px solid var(--card-border); }
.hand-cards { flex:1; display:flex; gap:8px; overflow-x:auto; padding:6px; }
.card { min-width:120px; width:120px; min-height:150px; padding:12px 8px; background:var(--card-bg); border:1px solid var(--card-border); border-radius:10px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; transition:0.2s; user-select:none; position:relative; }
.card:hover { border-color:var(--accent-gold); transform:translateY(-4px); }
.card.dragging { opacity:0.5; }
.card-name { font-size:16px; font-weight:700; color:var(--text); }
.card-type-badge { position:absolute; top:3px; right:3px; width:24px; height:24px; border-radius:50%; font-size:11px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; }
.card-type-badge.land { background:var(--land-color); }
.card-type-badge.sky { background:var(--sky-color); }
.card-type-badge.sea { background:var(--sea-color); }

#drag-overlay { position:fixed; top:0; left:0; right:0; bottom:0; z-index:1000; pointer-events:none; display:none; background: transparent; transition: background 0.3s; }
#drag-overlay.active { display:block; background: rgba(0,0,0,0.55); }
.skill-fan-container { position:absolute; }
.skill-fan-item { border-radius:12px; display:flex; align-items:center; justify-content:flex-start; font-size:12px; font-weight:700; color:var(--text); text-align:left; flex-direction:column; line-height:1.3; padding:6px 8px; overflow:hidden; z-index:10; }
.skill-fan-item.visible { background:var(--skill-pill-bg); border:2px solid var(--border-color); }
.drag-ghost-card { position:absolute; pointer-events:none; display:none; z-index:10; }
#drag-resource-bar { position:fixed; bottom:180px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; font-size:15px; padding:10px 24px; border-radius:12px; z-index:20; display:none; gap:20px; white-space:nowrap; pointer-events:none; }
#drag-resource-bar.show { display:flex; }
#drag-resource-bar .res-enough { color:#4caf50; font-weight:700; }
#drag-resource-bar .res-short { color:#e74c3c; font-weight:700; }

/* Deck Panel */
#panel-deck { flex-direction:column; gap:12px; }
.deck-header { display:flex; justify-content:space-between; align-items:flex-start; }
.deck-title { font-size:24px; font-weight:700; }
.deck-subtitle { font-size:15px; color:var(--text-muted); margin-top:4px; }
.deck-close { background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; }
.deck-close:hover { color:var(--text); }
.deck-filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center; }
.filter-label { font-size:16px; color:var(--text-muted); margin-right:4px; flex-shrink:0; font-weight:700; }
.filter-btn { padding:4px 14px; border-radius:14px; border:1px solid var(--card-border); background:rgba(255,255,255,0.04); color:var(--text-muted); cursor:pointer; font-size:13px; font-family:var(--font-stack); transition:0.2s; }
.filter-btn.active { background:var(--accent-gold); border-color:var(--accent-gold); color:#1a1a2e; font-weight:700; }
.filter-btn:hover:not(.active) { border-color:var(--accent-gold); color:var(--accent-gold); }
.deck-body { display:flex; gap:12px; flex:1; min-height:0; overflow:hidden; }
.deck-presets { width:140px; min-width:140px; display:flex; flex-direction:column; gap:8px; padding:4px 0; border-right:1px solid var(--card-border); }
.preset-title { font-size:14px; font-weight:600; color:var(--text-muted); margin-bottom:4px; }
.preset-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:14px 8px; border-radius:10px; background:rgba(255,255,255,0.04); border:2px solid var(--card-border); color:var(--text); cursor:pointer; font-family:var(--font-stack); transition:0.2s; flex-shrink:0; }
.preset-btn:hover { border-color:var(--accent-gold); background:rgba(232,184,109,0.08); }
.preset-btn:active { background:rgba(232,184,109,0.15); }
.preset-name { font-size:14px; font-weight:600; }
.preset-count { font-size:11px; color:var(--text-muted); font-weight:400; }
.preset-desc { font-size:10px; color:var(--text-muted); text-align:center; line-height:1.3; }
.deck-card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:10px; flex:1; overflow-y:auto; align-content:start; }
.deck-card-item { background:var(--card-bg); border:2px solid var(--card-border); border-radius:8px; padding:14px; cursor:pointer; display:flex; flex-direction:column; gap:6px; transition:0.2s; position:relative; align-items:flex-start; }
.deck-card-item:hover { border-color:var(--accent-gold); }
.deck-card-item.selected { border-color:var(--accent-gold); background:rgba(232,184,109,0.08); }
.deck-card-type-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; flex-shrink:0; }
.deck-card-type-icon.land { background:var(--land-color); }
.deck-card-type-icon.sky { background:var(--sky-color); }
.deck-card-type-icon.sea { background:var(--sea-color); }
.deck-card-name { font-size:18px; font-weight:700; }
.deck-card-name-row { display:flex; align-items:center; gap:10px; }
.deck-card-archetypes { display:flex; gap:4px; flex-wrap:wrap; min-height:20px; }
.archetype-tag { font-size:11px; background:rgba(108,99,255,0.2); color:var(--accent); padding:2px 8px; border-radius:8px; }
.deck-card-archetype-badge { font-size:12px; font-weight:700; padding:2px 10px; border-radius:8px; flex-shrink:0; }
.deck-card-archetype-badge.mengshou { background:rgba(231,76,60,0.18); color:#e74c3c; border:1px solid rgba(231,76,60,0.3); }
.deck-card-archetype-badge.chunhui { background:rgba(76,175,80,0.18); color:#4caf50; border:1px solid rgba(76,175,80,0.3); }
.deck-card-archetype-badge.qiqiao { background:rgba(232,184,109,0.18); color:#e8b86d; border:1px solid rgba(232,184,109,0.3); }
.deck-card-archetype-badge.tongyong { background:rgba(255,255,255,0.06); color:var(--text-muted); border:1px solid rgba(255,255,255,0.1); }
.deck-card-archetype-badge.xuanmiao { background:rgba(155,89,182,0.18); color:#c39bdb; border:1px solid rgba(155,89,182,0.3); }
.deck-card-archetype-badge.aoyou { background:rgba(52,152,219,0.18); color:#7ec8e3; border:1px solid rgba(52,152,219,0.3); }
.deck-card-archetype-badge.jihan { background:rgba(149,165,166,0.18); color:#b0bec5; border:1px solid rgba(149,165,166,0.3); }
.deck-card-type-text { font-size:11px; color:var(--text-muted); font-weight:400; padding:1px 4px; border-radius:4px; flex-shrink:0; }
.deck-card-type-text.land { background:rgba(139,154,75,0.15); color:var(--land-color); }
.deck-card-type-text.sky { background:rgba(107,163,199,0.15); color:var(--sky-color); }
.deck-card-type-text.sea { background:rgba(91,140,184,0.15); color:var(--sea-color); }
.deck-card-skills { font-size:13px; color:var(--text-muted); line-height:1.5; padding-left:4px; width:100%; }
.deck-card-skills span { color:var(--accent-gold); }
.deck-skill-detail { font-size:12px; color:var(--text-muted); line-height:1.35; margin:1px 0 1px 8px; }
.deck-skill-cost { font-size:11px; color:#a09888; }
.deck-card-checkbox { position:absolute; top:10px; right:10px; width:22px; height:22px; cursor:pointer; accent-color:var(--accent-gold); }
.deck-footer { display:flex; align-items:center; gap:12px; flex-shrink:0; }
.deck-selected-count { font-size:16px; color:var(--text-muted); }
.btn-start-game { padding:12px 32px; border-radius:24px; background:var(--accent-gold); border:none; color:#fff; font-weight:700; cursor:pointer; font-size:18px; }
.btn-start-game:disabled { opacity:0.4; cursor:not-allowed; }

/* Stats Panel */
#panel-stats { flex-direction:column; }
.stats-modal { background:var(--panel-bg); border-radius:12px; padding:20px; max-width:900px; width:100%; margin:0 auto; }
.stats-modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.stats-modal-title { font-size:20px; font-weight:700; }
.stats-modal-close { background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; }
.stats-modal-close:hover { color:var(--text); }
.stats-table-wrap { overflow-x:auto; }
.stats-table { width:100%; border-collapse:collapse; font-size:14px; }
.stats-table th, .stats-table td { border:1px solid var(--card-border); padding:8px 12px; text-align:center; }
.stats-table th { background:var(--card-bg); color:var(--text-muted); }
.stats-table td { color:var(--text); }
.btn-export { display:block; margin:12px auto 0; padding:8px 20px; border-radius:20px; background:var(--accent-gold); border:none; color:#1a1a2e; font-weight:700; font-size:14px; cursor:pointer; font-family:var(--font-stack); transition:0.2s; }
.btn-export:hover { opacity:0.85; }

/* System Panel */
#panel-system { flex-direction:column; align-items:center; justify-content:center; }
.system-card { background:var(--panel-bg); border-radius:12px; padding:30px; text-align:center; max-width:450px; width:100%; }
.system-title { font-size:22px; font-weight:700; margin-bottom:20px; }
.system-buttons { display:flex; flex-direction:column; gap:12px; }
.btn-system { padding:14px 24px; border-radius:20px; border:none; font-size:18px; font-weight:600; cursor:pointer; transition:0.2s; color:#fff; }
.btn-system.save { background:var(--success); }
.btn-system.load { background:var(--accent); }
.btn-system.reset { background:var(--danger); }
.btn-system:hover { opacity:0.85; }

/* Settings Rows */
.setting-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0; }
.setting-label { font-size:15px; color:var(--text-muted); }
.toggle-group { display:flex; gap:0; border-radius:8px; overflow:hidden; border:1px solid var(--card-border); }
.toggle-btn { padding:6px 16px; font-size:13px; border:none; background:rgba(255,255,255,0.05); color:var(--text-muted); cursor:pointer; transition:0.2s; font-family:var(--font-stack); }
.toggle-btn.active { background:var(--accent-gold); color:#1a1a2e; font-weight:700; }
.toggle-btn:hover:not(.active) { background:rgba(255,255,255,0.1); }

/* Click Mode Overlay */
#click-overlay { position:fixed; top:0;left:0;right:0;bottom:0; z-index:900; display:none; }
#click-overlay.active { display:block; }
.card.click-selected { border-color:var(--accent-gold) !important; box-shadow:0 0 16px rgba(232,184,109,0.4) !important; transform:translateY(-6px) !important; }
#skill-desc-tooltip { position:fixed; top:10%; left:50%; transform:translateX(-50%); z-index:1100; background:rgba(0,0,0,0.9); color:#fff; font-size:18px; padding:10px 18px; border-radius:10px; max-width:80vw; text-align:center; display:none; pointer-events:none; }
#skill-desc-tooltip.show { display:block; }

@media (max-width:768px) {
  .toggle-btn { padding:5px 12px; font-size:11px; }
  .setting-label { font-size:13px; }
  .system-card { padding:16px; }
}

/* Modal */
.modal-overlay { position:fixed; top:0;left:0;right:0;bottom:0; z-index:2000; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal-dialog { background:var(--panel-bg); border-radius:12px; padding:28px; min-width:320px; max-width:90vw; text-align:center; border:1px solid var(--card-border); }
.modal-dialog h3 { font-size:20px; margin-bottom:10px; }
.modal-dialog p { font-size:16px; color:var(--text-muted); margin-bottom:20px; }
.modal-buttons { display:flex; gap:12px; justify-content:center; }
.modal-btn { padding:10px 28px; border-radius:20px; border:1px solid var(--card-border); background:var(--card-bg); color:var(--text); cursor:pointer; font-size:16px; }
.modal-btn.confirm { background:var(--accent-gold); border-color:var(--accent-gold); color:#fff; font-weight:600; }
.modal-btn:hover { opacity:0.85; }

/* Toast */
.toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); z-index:3000; background:rgba(0,0,0,0.85); color:#fff; padding:12px 28px; border-radius:20px; font-size:16px; opacity:0; visibility:hidden; transition:0.3s; white-space:nowrap; }
.toast.show { opacity:1; visibility:visible; }

/* Skill flow indicator (non-interactive) */

<body>
<div class="app-container">
  <aside class="sidebar" id="sidebar">
    <div class="nav-header">菜单</div>
    <nav class="nav-items">

          <div class="vs-indicator">VS</div>
          <div class="battlefield-avatar"><div class="avatar-circle boss-avatar">&#x2744;</div><span class="avatar-label" id="boss-avatar-label">Boss</span></div>

    </section>
    <section class="panel" id="panel-stats">
      <div class="stats-modal"><div class="stats-modal-header"><span class="stats-modal-title">&#x1F4CA; 战斗数据统计</span><button class="stats-modal-close" id="stats-close">&#x2715;</button></div><div class="stats-table-wrap"><table class="stats-table" id="stats-table"></table></div><button class="btn-export" id="btn-export-report">&#x1F4CB; 复制对战报告</button></div>
    </section>
    <section class="panel" id="panel-system">
      <div class="system-card">
        <div class="system-title">&#x2699; 系统设置</div>
        <div class="setting-row">
          <span class="setting-label">使用卡牌方式</span>
          <div class="toggle-group" id="setting-control">
            <button class="toggle-btn" data-val="drag">拖拽</button>
            <button class="toggle-btn" data-val="click">点击</button>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">技能描述文本</span>
          <div class="toggle-group" id="setting-desc">
            <button class="toggle-btn" data-val="full">全量</button>
            <button class="toggle-btn" data-val="concise">简洁</button>
          </div>
        </div>
        <div class="system-buttons"><button class="btn-system save" id="btn-save">&#x1F4BE; 保存游戏</button><button class="btn-system load" id="btn-load">&#x1F4C2; 加载游戏</button><button class="btn-system reset" id="btn-reset">&#x1F504; 重置游戏</button></div>
      </div>
    </section>
    <section class="panel" id="panel-changelog">
      <div class="changelog-card">
        <div class="changelog-title">&#x1F4CB; 更新日志</div>
        <div class="changelog-list" id="changelog-list"></div>
      </div>
    </section>
  </main>
</div>
<div id="drag-overlay">
  <div class="skill-fan-container" id="skill-fan"></div>
  <div class="drag-ghost-card" id="drag-ghost"><span class="card-name"></span></div>
  <div id="drag-resource-bar"></div>
</div>
<div id="click-overlay"></div>
<div id="skill-desc-tooltip"></div>
<div class="modal-overlay" id="modal-confirm">
  <div class="modal-dialog"><h3 id="modal-title"></h3><p id="modal-message"></p><div class="modal-buttons"><button class="modal-btn" id="modal-cancel">取消</button><button class="modal-btn confirm" id="modal-confirm-btn">确认</button></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
"use strict";

var APP_VERSION = 1; // test mode: -1 runs full tests, >0 skips

function isMobileDevice() {
  return /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
}

var settings = {
  control: "drag",
  desc: "full"
};

var clickModeCard = null;
var clickModeCardEl = null;
var clickHighlightIdx = -1;

function clickClearHighlight() {
  if (clickHighlightIdx >= 0) {
    var fanEls = document.getElementById("skill-fan").children;
    if (fanEls[clickHighlightIdx]) {
      fanEls[clickHighlightIdx].style.borderColor = "#4a4a6e";
      fanEls[clickHighlightIdx].style.transform = "translate(-50%,0)";
      fanEls[clickHighlightIdx].style.background = "var(--skill-pill-bg, #2a2a3e)";
      fanEls[clickHighlightIdx].style.boxShadow = "0 4px 16px rgba(0,0,0,0.4)";
      fanEls[clickHighlightIdx].style.zIndex = "10";
    }
    clickHighlightIdx = -1;
  }
}

function clickHighlight(i) {
  clickClearHighlight();
  if (i < 0) return;
  var fanEls = document.getElementById("skill-fan").children;
  if (fanEls[i]) {
    fanEls[i].style.borderColor = "#ffd700";
    fanEls[i].style.transform = "translate(-50%,0) scale(1.1)";
    fanEls[i].style.background = "rgba(232,184,109,0.25)";
    fanEls[i].style.boxShadow = "0 0 24px rgba(232,184,109,0.5), 0 4px 16px rgba(0,0,0,0.4)";
    fanEls[i].style.zIndex = "20";
    clickHighlightIdx = i;
  }
}

function cancelClickMode() {
  clickClearHighlight();
  clickModeCard = null;
  if (clickModeCardEl) { clickModeCardEl.classList.remove("click-selected"); clickModeCardEl = null; }
  document.getElementById("skill-fan").innerHTML = "";
  document.getElementById("drag-resource-bar").classList.remove("show");
  document.getElementById("click-overlay").classList.remove("active");
  document.getElementById("skill-desc-tooltip").classList.remove("show");
  var overlay = document.getElementById("drag-overlay");
  overlay.classList.remove("active");
  overlay.style.pointerEvents = "none";
  if (dragState) { onDragEnd({}); }
}

function applySettingsUI() {
  var ctrlBtns = document.getElementById("setting-control").querySelectorAll(".toggle-btn");
  for (var bi = 0; bi < ctrlBtns.length; bi++) {
    ctrlBtns[bi].classList.toggle("active", ctrlBtns[bi].dataset.val === settings.control);
  }
  var descBtns = document.getElementById("setting-desc").querySelectorAll(".toggle-btn");
  for (var dj = 0; dj < descBtns.length; dj++) {
    descBtns[dj].classList.toggle("active", descBtns[dj].dataset.val === settings.desc);
  }
}

function initSettings() {
  var dm = isMobileDevice();
  if (!localStorage.getItem("h5game_control")) settings.control = dm ? "click" : "drag";
  else settings.control = localStorage.getItem("h5game_control");
  if (!localStorage.getItem("h5game_desc")) settings.desc = dm ? "concise" : "full";
  else settings.desc = localStorage.getItem("h5game_desc");
  applySettingsUI();
  document.getElementById("setting-control").addEventListener("click", function(e) {
    if (!e.target.classList.contains("toggle-btn")) return;
    settings.control = e.target.dataset.val;
    localStorage.setItem("h5game_control", settings.control);
    applySettingsUI();
    cancelClickMode();
    if (game.player) renderAll();
  });
  document.getElementById("setting-desc").addEventListener("click", function(e) {
    if (!e.target.classList.contains("toggle-btn")) return;
    settings.desc = e.target.dataset.val;
    localStorage.setItem("h5game_desc", settings.desc);
    applySettingsUI();
    if (game.player) renderAll();
  });
  document.getElementById("click-overlay").addEventListener("click", function() {
    cancelClickMode();
  });
  document.getElementById("drag-overlay").addEventListener("click", function(e) {
    if (!clickModeCard) return;
    var fanEls = document.getElementById("skill-fan").children;
    for (var i = 0; i < fanEls.length; i++) {
      var rect = fanEls[i].getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        e.stopPropagation();
        onFanSkillClick(e);
        return;
      }
    }
    cancelClickMode();
  });
  document.addEventListener("mousemove", function(e) {
    if (!clickModeCard) return;
    var fanEls = document.getElementById("skill-fan").children;
    var found = false;
    for (var i = 0; i < fanEls.length; i++) {
      var rect = fanEls[i].getBoundingClientRect();
      if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        var skills = [];
        for (var j = 0; j < clickModeCard.skills.length; j++) {
          if (!clickModeCard.skills[j].isPassive) skills.push(clickModeCard.skills[j]);
        }
        if (i < skills.length) {
          clickHighlight(i);
          if (settings.desc === "concise" && skills[i].desc) {
            document.getElementById("skill-desc-tooltip").textContent = skills[i].desc;
            document.getElementById("skill-desc-tooltip").classList.add("show");
          }
          found = true;
        }
        break;
      }
    }
    if (!found) {
      clickClearHighlight();
      if (settings.desc === "concise") document.getElementById("skill-desc-tooltip").classList.remove("show");
    }
  });
  if (isMobileDevice()) {
    var lpTimer = null;
    document.getElementById("drag-overlay").addEventListener("touchstart", function(e) {
      if (!clickModeCard) return;
      var t = e.touches[0];
      lpTimer = setTimeout(function() {
        var fanEls = document.getElementById("skill-fan").children;
        for (var i = 0; i < fanEls.length; i++) {
          var rect = fanEls[i].getBoundingClientRect();
          if (t.clientX >= rect.left && t.clientX <= rect.right && t.clientY >= rect.top && t.clientY <= rect.bottom) {
            var skills = []; for (var j = 0; j < clickModeCard.skills.length; j++) { if (!clickModeCard.skills[j].isPassive) skills.push(clickModeCard.skills[j]); }
            if (i < skills.length) {
              clickHighlight(i);
              if (settings.desc === "concise" && skills[i].desc) {
                document.getElementById("skill-desc-tooltip").textContent = skills[i].desc;
                document.getElementById("skill-desc-tooltip").classList.add("show");
              }
            }
            break;
          }
        }
      }, 500);
    }, { passive: true });
    document.getElementById("drag-overlay").addEventListener("touchend", function() {
      clearTimeout(lpTimer);
      document.getElementById("skill-desc-tooltip").classList.remove("show");
      clickClearHighlight();
    });
  }
}

var CHANGELOG = [
  { date: "2026-06-15", text: "·新增雪豹、北极熊、青蛙三张卡牌" },
  { date: "2026-06-14", text: "·调整肉食的产量，每回合获得的肉食减少1点<br>·安居技能调整：1回合提高50%抵挡率->2回合提高30%抵挡率<br>·新增基本春晖体系2推荐卡组" },
  { date: "2026-06-10", text: "增强老鼠，将藏匿中获得的素食由1->2" },
  { date: "2026-06-09", text: "新增松鸦、松鼠、狮子三张卡牌，完善春晖体系" },
  { date: "2026-06-08", text: "添加释放技能的交互方式以及技能文本描述的切换开关" },
  { date: "2026-06-07", text: "修复移动端下开始游戏按钮无法显示的问题" }
];

function renderChangelog() {
  var list = document.getElementById("changelog-list");
  if (!list) return;
  list.innerHTML = "";
  for (var i = 0; i < CHANGELOG.length; i++) {
    var item = CHANGELOG[i];
    var div = document.createElement("div");
    div.className = "changelog-item";
    div.innerHTML = '<div class="changelog-date">' + item.date + '</div><div class="changelog-text">' + item.text + '</div>';
    list.appendChild(div);
  }
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function randInt(max) { return Math.floor(Math.random() * max) + 1; }
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

// ===== SKILL DEFINITIONS =====
let SKILL_DEFS = {};

function defSkill(name, costs, desc, execFn, opts) {
  opts = opts || {};
  SKILL_DEFS[name] = function(slaughterNum, liquifyNum) {
    slaughterNum = slaughterNum || 1;
    liquifyNum = liquifyNum || 1;
    let skill = {
      name: name,
      vegCost: costs.v || 0,
      meatCost: costs.m || 0,
      waterCost: costs.w || 0,
      isPassive: !!opts.isPassive,
      desc: desc,
      logDesc: '',
      stayRound: 0,
      sourceCardName: '',
      slaughterNum: slaughterNum,
      liquifyNum: liquifyNum,
      exec: execFn
    };
    return skill;
  };
}

// Universal discard skills
defSkill("屠宰", {}, "废弃此牌，获得肉食", function(you,enemy,ctx){
  you.meat += this.slaughterNum;
  this.logDesc = you.name + '获得了' + this.slaughterNum + '点肉食';
});
defSkill("融化", {}, "废弃此牌，获得水源", function(you,enemy,ctx){
  you.water += this.liquifyNum;
  this.logDesc = you.name + '获得了' + this.liquifyNum + '点水源';
});

// === Player skills ===
defSkill("虎啸", {m:5}, "永久提升8点暴击率", function(you,enemy,ctx){
  you.criticalRate += 8;
  this.logDesc = you.name + '增加了8点暴击率';
});
defSkill("利爪挥击", {m:5}, "造成500点伤害，本次攻击临时提升8点暴击率", function(you,enemy,ctx){
  var r = you.calcDamage(500, enemy, 8);
  enemy.hp -= r.dmg;
  this.logDesc = you.name + '对' + enemy.name + '造成了' + r.dmg + '点伤害';
});
defSkill("虎虎生风", {m:18}, "造成3次500点伤害，如果造成暴击则多造成一次，至多5次", function(you,enemy,ctx){
  var times = 3;
  for (var i = 1; i <= times && i <= 5; i++) {
    var r = you.calcDamage(500, enemy, 0);
    enemy.hp -= r.dmg;
    this.logDesc = '第' + i + '次攻击，' + you.name + '对' + enemy.name + '造成了' + r.dmg + '点伤害';
    if (i < times) ctx.addLog(this.logDesc);
    if (r.isCrit && times < 5) times++;
  }
});
defSkill("锐利目光", {m:2}, "接下来3回合降低10点受到的异常状态施加成功率", function(you,enemy,ctx){
  you.addBuff(makeBuff("锐利目光", true, 3, "降低10点异常状态施加成功率", {}, function(r){return Math.max(0, r - 10);}));
  this.logDesc = you.name + '获得了锐利目光增益';
});
defSkill("翅膀攻击", {m:4}, "造成500点伤害", function(you,enemy,ctx){
  var r = you.calcDamage(500, enemy, 0);
  enemy.hp -= r.dmg;
  this.logDesc = you.name + '对' + enemy.name + '造成了' + r.dmg + '点伤害';
});
defSkill("鹰击长空", {m:10}, "造成800点伤害，下回合你多抽1张牌，对方少抽1张牌", function(you,enemy,ctx){
  var r = you.calcDamage(800, enemy, 0);
  enemy.hp -= r.dmg;
  you.addBuff(makeBuff("鹰击长空", true, 1, "多抽一张牌", {draw:function(c){return c+1;}}));
  enemy.addBuff(makeBuff("鹰击长空", false, 1, "少抽一张牌", {draw:function(c){return Math.max(c-1, 1);}}));
  this.logDesc = you.name + '对' + enemy.name + '造成了' + r.dmg + '点伤害';
});
defSkill("戏水", {v:1}, "获得5点湖泊经验", function(you,enemy,ctx){

// ===== BUFF FACTORY =====
function makeBuff(name, isBuff, lastRound, desc, effects, judgeFn) {
  effects = effects || {};
  return {
    name: name,
    isBuff: isBuff,
    lastRound: lastRound,
    isPermanent: false,
    description: desc || name,
    damageBuffEffect: effects.damage || function(d){return d;},
    defendBuffEffect: effects.defend || function(d){return d;},
    drawCardBuffEffect: effects.draw || function(c){return c;},
    judgeBuffEffect: judgeFn || function(r){return r;},
    cureBuffEffect: effects.cure || function(c){return c;},
    critRateBuffEffect: effects.critRate || function(r){return r;},
    defendRateBuffEffect: effects.defendRate || function(r){return r;}
  };
}

    this.phase = (this.phase + steps) % 4;
    this.description = ["新月", "上弦月", "满月", "下弦月"][this.phase];
  };
  return b;
}

// ===== CARD FACTORY =====
function createCard(cardDef) {
  var skills = [];
  var hasSlaughter = cardDef.slaughterNum !== undefined;
  var hasLiquify = cardDef.liquifyNum !== undefined;
  for (var si = 0; si < cardDef.skills.length; si++) {
    var sn = cardDef.skills[si];
    var fn = SKILL_DEFS[sn];
    if (fn) {
      var s = fn(cardDef.slaughterNum || 1, cardDef.liquifyNum || 1);
      s.sourceCardName = cardDef.name;
      skills.push(s);
    }
  }
  if (hasSlaughter) {
    var ss = SKILL_DEFS["屠宰"](cardDef.slaughterNum || 1, cardDef.liquifyNum || 1);
    ss.sourceCardName = cardDef.name;
    ss.desc = "废弃此牌，获得" + ss.slaughterNum + "点肉食";
    skills.push(ss);
  } else if (hasLiquify) {
    var ms = SKILL_DEFS["融化"](cardDef.slaughterNum || 1, cardDef.liquifyNum || 1);
    ms.sourceCardName = cardDef.name;
    ms.desc = "废弃此牌，获得" + ms.liquifyNum + "点水源";
    skills.push(ms);
  } else if (cardDef.harvestNum !== undefined) {
    var hs = SKILL_DEFS["收割"](1, 1);
    hs.sourceCardName = cardDef.name;
    hs.desc = "废弃此牌，获得1点素食";
    skills.push(hs);
  }
  return {
    name: cardDef.name,
    type: cardDef.type,
    skills: skills,
    id: cardDef.id,
    archetype: cardDef.archetype || "",
    slaughterNum: cardDef.slaughterNum || 0,
    liquifyNum: cardDef.liquifyNum || 0
  };
}

// ===== PLAYER CLASS =====
function Player(name, isBoss, maxHp) {
  this.name = name;
  this.isBoss = !!isBoss;
  this.max_hp = maxHp || 5000;
  this._hp = this.max_hp;
  this._veg = 1;
  this.vegetarian_level = 1;
  this._vegExp = 0;
  this._meat = 1;
  this.meat_level = 1;
  this._meatExp = 0;
  this._wat = 1;
  this.water_level = 1;
  this._waterExp = 0;
  this._critR = 0;
  this._critD = 150;
  this._defR = 5;
  this.cardStack = [];
  this.usedCardStack = [];
  this.cardList = [];
  this.buffs = [];
  this.debuffs = [];
  this.skillQueue = [];
  this.cardStatsMap = {};
  this.cardTypeList = [];
  this.vegIndicator = 0;
  this.vegIndicatorActive = false;
  this.defendReduction = 0.6;
  this.totalWaterConsumed = 0;
  this.hasRainBuff = false;
  this.companionCount = 0;
  this.companionActive = false;
}

Player.prototype = {
  get moonPhase() {
    for (var i = 0; i < this.buffs.length; i++) {
      if (this.buffs[i].name === "月相") return this.buffs[i].phase;
    }
    return 0;
  },

  moonPhaseName: function() {
    return ["新月", "上弦月", "满月", "下弦月"][this.moonPhase];
  },

  advanceMoon: function(steps) {
    for (var i = 0; i < this.buffs.length; i++) {
      if (this.buffs[i].name === "月相") {
        this.buffs[i].advancePhase(steps);
        this.buffs[i].description = this.moonPhaseName();
        return;
      }
    }
  },

  resetMoon: function() {
    for (var i = 0; i < this.buffs.length; i++) {
      if (this.buffs[i].name === "月相") {
        this.buffs[i].phase = 0;
        this.buffs[i].description = "新月";
        return;
      }
    }
  },

  initCardStack: function(selectedDefs) {
    this.cardTypeList = selectedDefs.map(function(d) { return d.id; });
    this.cardStack = [];
    this.usedCardStack = [];
    this.cardList = [];
    this.buffs = [];
    this.debuffs = [];
    this.vegIndicator = 0;
    this.vegIndicatorActive = false;
    for (var di = 0; di < selectedDefs.length; di++) {
      for (var i = 0; i < 4; i++) {
        this.cardStack.push(createCard(selectedDefs[di]));
      }
    }
    shuffle(this.cardStack);
    var hasQiqiao = false, hasIndicator = false, hasThick = false, hasRain = false, hasComp = false;
    for (var di2 = 0; di2 < selectedDefs.length; di2++) {
      if (selectedDefs[di2].archetype === "乞巧") hasQiqiao = true;
      if (selectedDefs[di2].hasVegIndicator) hasIndicator = true;
      if (selectedDefs[di2].hasThickFat) hasThick = true;
      if (selectedDefs[di2].hasRainBuff) hasRain = true;
      if (selectedDefs[di2].companionActive) hasComp = true;
    }
    if (hasQiqiao) {
      this.addBuff(makeMoonPhaseBuff());
    }
    if (hasIndicator) {
      this.vegIndicatorActive = true;
      this.vegIndicator = 0;
    }
    if (hasThick) this.defendReduction = 0.8;
    if (hasRain) this.hasRainBuff = true;
    if (hasComp) this.companionActive = true;
  },

  resetStats: function() {
    this._hp = this.max_hp;
    this._veg = 1; this.vegetarian_level = 1; this._vegExp = 0;
    this._meat = 1; this.meat_level = 1; this._meatExp = 0;
    this._wat = 1; this.water_level = 1; this._waterExp = 0;
    this._critR = 0; this._critD = 150; this._defR = 5;
    this.cardStatsMap = {};
    this.skillQueue = [];
    this.defendReduction = 0.6;
    this.totalWaterConsumed = 0;
    this.hasRainBuff = false;
    this.companionCount = 0;
    this.companionActive = false;
  },

  isResEnough: function(skill) {
    var costUp = this.hasDeBuff("技能消耗+1") ? 1 : 0;
    var vOK = this.vegetarian >= skill.vegCost + (skill.vegCost > 0 ? costUp : 0);
    var mOK = this.meat >= skill.meatCost + (skill.meatCost > 0 ? costUp : 0);
    var wOK = this.water >= skill.waterCost + (skill.waterCost > 0 ? costUp : 0);
    return vOK && mOK && wOK;
  },

  canUseSkill: function(skill) {
    var pendingVeg = 0, pendingMeat = 0, pendingWater = 0;
    for (var i = 0; i < this.skillQueue.length; i++) {
      pendingVeg += this.skillQueue[i].vegCost;
      pendingMeat += this.skillQueue[i].meatCost;
      pendingWater += this.skillQueue[i].waterCost;
    }
    if (skill.vegCost > 0) return this.vegetarian >= pendingVeg + skill.vegCost;
    if (skill.meatCost > 0) return this.meat >= pendingMeat + skill.meatCost;
    if (skill.waterCost > 0) return this.water >= pendingWater + skill.waterCost;
    return true;
  },

  consumeResourcesExact: function(skill) {
    var vUsed = skill.vegCost, mUsed = skill.meatCost, wUsed = skill.waterCost;
    if (this.hasDeBuff("技能消耗+1")) {
      if (skill.vegCost > 0) vUsed += 1;
      if (skill.meatCost > 0) mUsed += 1;
      if (skill.waterCost > 0) wUsed += 1;
    }
    this._veg -= vUsed;
    this._meat -= mUsed;
    this._wat -= wUsed;
    if (this.vegIndicatorActive) this.vegIndicator += vUsed;
    if (this.hasRainBuff) this.totalWaterConsumed += wUsed;
    return { vUsed: vUsed, mUsed: mUsed, wUsed: wUsed };
  },

  calcDamage: function(damage, enemy, tempCritRate) {
    tempCritRate = tempCritRate || 0;
    var d = damage;
    var isCrit = false;
    var effCrit = this.criticalRate + tempCritRate;
    for (var i = 0; i < this.buffs.length; i++) effCrit = this.buffs[i].critRateBuffEffect(effCrit);
    for (var i2 = 0; i2 < this.debuffs.length; i2++) effCrit = this.debuffs[i2].critRateBuffEffect(effCrit);
    if (randInt(100) <= effCrit) {
      d = Math.floor(d * this.criticalDamage / 100);
      isCrit = true;
      game.addLog(this.name + '打出了暴击！！！');
    }
    for (var j = 0; j < this.buffs.length; j++) d = this.buffs[j].damageBuffEffect(d);
    for (var j2 = 0; j2 < this.debuffs.length; j2++) d = this.debuffs[j2].damageBuffEffect(d);
    for (var k = 0; k < enemy.buffs.length; k++) d = enemy.buffs[k].defendBuffEffect(d);
    for (var k2 = 0; k2 < enemy.debuffs.length; k2++) d = enemy.debuffs[k2].defendBuffEffect(d);
    var effDef = enemy.defendRate;
    for (var m = 0; m < enemy.buffs.length; m++) effDef = enemy.buffs[m].defendRateBuffEffect(effDef);
    for (var m2 = 0; m2 < enemy.debuffs.length; m2++) effDef = enemy.debuffs[m2].defendRateBuffEffect(effDef);
    if (randInt(100) <= effDef) {
      d = Math.floor(d * (1 - enemy.defendReduction));
      game.addLog(enemy.name + '抵挡了本次攻击，减免了60%伤害');
    }
    return { dmg: Math.floor(d), isCrit: isCrit };
  },

  calcCure: function(cureValue) {
    var c = cureValue;
    for (var i = 0; i < this.buffs.length; i++) c = this.buffs[i].cureBuffEffect(c);
    for (var i2 = 0; i2 < this.debuffs.length; i2++) c = this.debuffs[i2].cureBuffEffect(c);
    return Math.floor(c);
  },

  judgeDebuff: function(rate, caster) {
    var r = rate;
    for (var i = 0; i < this.buffs.length; i++) r = this.buffs[i].judgeBuffEffect(r);
    for (var i2 = 0; i2 < this.debuffs.length; i2++) r = this.debuffs[i2].judgeBuffEffect(r);
    for (var j = 0; j < caster.buffs.length; j++) r = caster.buffs[j].judgeBuffEffect(r);
    for (var j2 = 0; j2 < caster.debuffs.length; j2++) r = caster.debuffs[j2].judgeBuffEffect(r);
    return randInt(100) <= r;
  },

  addBuff: function(buff) {
    var list = buff.isBuff ? this.buffs : this.debuffs;
    for (var i = 0; i < list.length; i++) {
      if (list[i].name === buff.name) {
        list[i].lastRound = Math.max(list[i].lastRound, buff.lastRound);
        return;
      }
    }
    list.push(buff);
  },

  hasBuff: function(name) {
    for (var i = 0; i < this.buffs.length; i++) {
      if (this.buffs[i].name === name) return true;
    }
    return false;
  },

  hasDeBuff: function(name) {
    for (var i = 0; i < this.debuffs.length; i++) {
      if (this.debuffs[i].name === name) return true;
    }
    return false;
  },

  removeAllDebuffs: function() {
    this.debuffs = [];
  },

  drawCard: function() {
    if (this.cardStack.length === 0) {
      this.cardStack = shuffle(this.usedCardStack.slice());
      this.usedCardStack = [];
    }
    if (this.cardStack.length === 0) return;
    var card = this.cardStack.shift();
    if (card.isAutoCast) {
      // 寒风：自释放，不进入手牌
      game.addLog(this.name + '遭遇到寒风！');
      this.hp -= 300;
      this.water += 2;
      this.addBuff(makeBuff("寒风", true, 1, "下回合多抽一张牌", {draw:function(c){return c+1;}}));
      game.addLog(this.name + '受到300点伤害，获得2点水源，下回合多抽一张牌');
      // 不加入 usedCardStack，从牌堆中永久移除
      return;
    }
    this.cardList.push(card);
  },

  getResources: function() {
    this._veg += LEVEL_TO_NUM[this.vegetarian_level];
    this._meat += MEAT_TO_NUM[this.meat_level];
    this._wat += LEVEL_TO_NUM[this.water_level];
    if (this.hasBuff("播种")) this._veg += 4;
  },

  calcExp: function(value, type) {
    while (true) {
      var level;
      if (type === 0) level = this.vegetarian_level;
      else if (type === 1) level = this.meat_level;
      else level = this.water_level;
      if (level >= 5) return value;
      var needExp = LEVEL_EXP[level] || 999;
      if (value < needExp) return value;
      if (type === 0) {
        this.vegetarian_level++;
        game.addLog(this.name + '的农田升级，当前等级为' + this.vegetarian_level);
      } else if (type === 1) {
        this.meat_level++;
        game.addLog(this.name + '的牧场升级，当前等级为' + this.meat_level);
      } else {
        this.water_level++;
        game.addLog(this.name + '的湖泊升级，当前等级为' + this.water_level);
      }
      value -= needExp;
    }
  },

  useSkill: function(card, skill) {
    skill.sourceCardName = card.name;
    this.skillQueue.push(skill);
    var idx = this.cardList.indexOf(card);
    if (idx >= 0) {
      this.cardList.splice(idx, 1);
      this.usedCardStack.push(card);
    }
    game.addLog(this.name + '释放了' + skill.name);
  },

  recordStats: function(skill, damage, heal, vegUsed, meatUsed, waterUsed) {
    var cn = skill.sourceCardName;
    if (!cn) return;
    if (!this.cardStatsMap[cn]) {
      this.cardStatsMap[cn] = { name: cn, timesUsed: 0, totalDamage: 0, totalHeal: 0, totalVeg: 0, totalMeat: 0, totalWater: 0 };
    }
    var s = this.cardStatsMap[cn];
    s.timesUsed++;
    s.totalDamage += damage || 0;
    s.totalHeal += heal || 0;
    s.totalVeg += vegUsed || 0;
    s.totalMeat += meatUsed || 0;
    s.totalWater += waterUsed || 0;
  }
};

// Properties
Object.defineProperty(Player.prototype, 'hp', {
  get: function() { return this._hp; },
  set: function(v) { this._hp = clamp(Math.floor(v), 0, this.max_hp); }
});
Object.defineProperty(Player.prototype, 'vegetarian', {
  get: function() { return this._veg; },
  set: function(v) { this._veg = Math.max(0, Math.floor(v)); }
});
Object.defineProperty(Player.prototype, 'meat', {
  get: function() { return this._meat; },
  set: function(v) { this._meat = Math.max(0, Math.floor(v)); }
});
Object.defineProperty(Player.prototype, 'water', {
  get: function() { return this._wat; },
  set: function(v) { this._wat = Math.max(0, Math.floor(v)); }
});
Object.defineProperty(Player.prototype, 'criticalRate', {
  get: function() { return this._critR; },
  set: function(v) { this._critR = clamp(Math.floor(v), 0, 100); }
});
Object.defineProperty(Player.prototype, 'criticalDamage', {
  get: function() { return this._critD; },
  set: function(v) { this._critD = clamp(Math.floor(v), 100, 300); }
});
Object.defineProperty(Player.prototype, 'defendRate', {
  get: function() { return this._defR; },
  set: function(v) { this._defR = clamp(Math.floor(v), 0, 100); }
});
Object.defineProperty(Player.prototype, 'vegetarian_exp', {
  get: function() { return this._vegExp; },
  set: function(v) { this._vegExp = this.calcExp(Math.max(0, v), 0); }
});
Object.defineProperty(Player.prototype, 'meat_exp', {
  get: function() { return this._meatExp; },
  set: function(v) { this._meatExp = this.calcExp(Math.max(0, v), 1); }
});
Object.defineProperty(Player.prototype, 'water_exp', {
  get: function() { return this._waterExp; },
  set: function(v) { this._waterExp = this.calcExp(Math.max(0, v), 2); }
});

// ===== SMALL SNOW MAN BOSS CLASS =====
function SmallSnowMan(name, maxHp) {
  Player.call(this, name, true, maxHp);
}
SmallSnowMan.prototype = Object.create(Player.prototype);
SmallSnowMan.prototype.useCards = function() {
  var boss = this;
  var p = game.player;
  var priorities = [
    {id: "WinterEntryCard", main: "寒冬入境", alt: "融化", condition: function(){return boss.vegetarian > 0 || boss.meat > 0;}},
    {id: "IceBarrierCard", main: "寒冰塑体", alt: "融化", condition: function(){return boss.hp < boss.max_hp * 0.8;}},
    {id: "ChillCard", main: "寒气逼人", alt: "融化", condition: function(){return true;}},
    {id: "TrickletCard", main: "涓流", alt: "融化", condition: function(){return boss.water_level < 5;}},
    {id: "ArcticCard", main: "极寒", alt: "融化", condition: function(){return p.hasDeBuff("寒气逼人") || boss.water >= 20;}},
    {id: "KnockCard", main: "撞击", alt: "融化", condition: function(){return true;}},
    {id: "FrostCard", main: "霜冻", alt: "融化", condition: function(){return p.vegetarian_exp > 0;}}
  ];
  while (boss.cardList.length > 0) {
    var processed = false;
    for (var pi = 0; pi < priorities.length; pi++) {
      var pr = priorities[pi];
      for (var hi = 0; hi < boss.cardList.length; hi++) {
        var c = boss.cardList[hi];
        if (c.id !== pr.id) continue;
        var mainSkill = null, altSkill = null;
        for (var si = 0; si < c.skills.length; si++) {
          if (c.skills[si].name === pr.main) mainSkill = c.skills[si];
          if (c.skills[si].name === pr.alt) altSkill = c.skills[si];
        }
        if (mainSkill && boss.canUseSkill(mainSkill) && pr.condition()) {
          boss.useSkill(c, mainSkill);
        } else if (altSkill) {
          boss.useSkill(c, altSkill);
        } else { continue; }
        processed = true;
        break;
      }
      if (processed) break;
    }
    if (!processed) break;
  }
};

// ===== MANTIS BOSS CLASS =====
function MantisBoss(name, maxHp) {
  Player.call(this, name, true, maxHp);
}
MantisBoss.prototype = Object.create(Player.prototype);
MantisBoss.prototype.useCards = function() {
  var boss = this;
  var enemy = game.player;
  var priorities = [
    {id: "MantisSeed",  main: "播种",  alt: "收割", condition: function(){return !boss.hasBuff("播种");}},
    {id: "MantisClaw",  main: "磨爪",  alt: "屠宰", condition: function(){return boss.canUseSkill(boss._findSkillInCard("MantisClaw","磨爪"));}},
    {id: "MatisSpring", main: "争农时", alt: "收割", condition: function(){return boss.canUseSkill(boss._findSkillInCard("MatisSpring","争农时"));}},
    {id: "MantisSickle",main: "麦镰",  alt: "收割", condition: function(){return enemy.vegetarian < 15 && boss.canUseSkill(boss._findSkillInCard("MantisSickle","麦镰"));}},
    {id: "MantisRain",  main: "雾雨",  alt: "融化", condition: function(){return boss.hp < boss.max_hp * 0.7 && boss.canUseSkill(boss._findSkillInCard("MantisRain","雾雨"));}},
    {id: "MantisWash",  main: "涓流",  alt: "融化", condition: function(){return boss.canUseSkill(boss._findSkillInCard("MantisWash","涓流"));}},
    {id: "MantisStorm", main: "雷雨惊", alt: "融化", condition: function(){return boss.canUseSkill(boss._findSkillInCard("MantisStorm","雷雨惊"));}}
  ];
  boss._findSkillInCard = function(cardId, skillName) {
    for (var i = 0; i < boss.cardList.length; i++) {
      var c = boss.cardList[i];
      if (c.id !== cardId) continue;
      for (var j = 0; j < c.skills.length; j++) {
        if (c.skills[j].name === skillName) return c.skills[j];
      }
    }
    return null;
  };
  while (boss.cardList.length > 0) {
    var processed = false;
    for (var pi = 0; pi < priorities.length; pi++) {
      var pr = priorities[pi];
      for (var hi = 0; hi < boss.cardList.length; hi++) {
        var c = boss.cardList[hi];
        if (c.id !== pr.id) continue;
        var mainSkill = null, altSkill = null;
        for (var si = 0; si < c.skills.length; si++) {
          if (c.skills[si].name === pr.main) mainSkill = c.skills[si];
          if (c.skills[si].name === pr.alt) altSkill = c.skills[si];
        }
        if (mainSkill && pr.condition()) {
          boss.useSkill(c, mainSkill);
        } else if (altSkill) {
          boss.useSkill(c, altSkill);
        } else { continue; }
        processed = true;
        break;
      }
      if (processed) break;
    }
    if (!processed) break;
  }
};

var game = {
  roundCount: 0,
  log: [],
  isOver: false,
  player: null,
  boss: null,
  selectedCards: [],

  startGame: function(cardDefs) {
    cancelClickMode();
    this.selectedCards = cardDefs;
    this.isOver = false;
    this.roundCount = 0;
    this.log = [];

    this.player = new Player("玩家", false, 5000);
    this.player.resetStats();
    this.player.initCardStack(cardDefs);

    if (Math.random() < 0.5) {
      this.boss = new SmallSnowMan("【小雪】小小雪人", 8000);
      this.boss.initCardStack(ALL_BOSS_CARDS);
    } else {
      this.boss = new MantisBoss("【芒种】时序螳螂", 7000);
      this.boss.initCardStack(MANTIS_BOSS_CARDS);
    }
    this.boss.resetStats();

    this.player.skillQueue = [];
    this.boss.skillQueue = [];

    this.addLog("⚔ 战斗开始 —— 万类霜天竞自由");
    this._drawForBoth();
    this._gatherForBoth();
    this.bossUseCards();
    this.roundCount++;

    switchPanel("battle");
  },

  isExecuting: false,

  nextRound: function() {
    cancelClickMode();
    if (this.isOver) return;
    if (this.isExecuting) { toast("技能正在释放中..."); return; }
    var self = this;
    this.isExecuting = true;

    this.addLog("━━━ 回合 " + this.roundCount + " ━━━");

    if (this._checkHP()) return;
    // 混乱：打乱技能队列（每回合仅一次，在buff tick前，确保混乱存活期内生效）
    if (this.player.hasDeBuff("混乱")) { shuffle(this.player.skillQueue); this.addLog("玩家的技能盘被打乱了！"); }
    if (this.boss.hasDeBuff("混乱")) { shuffle(this.boss.skillQueue); this.addLog(this.boss.name + "的技能盘被打乱了！"); }
    this._buffTick();
    // 落雨判定
    var rainPlayers = [this.player, this.boss];
    for (var rpi = 0; rpi < rainPlayers.length; rpi++) {
      var rp = rainPlayers[rpi];
      if (rp.hasRainBuff && rp.totalWaterConsumed >= 10) {
        rp.totalWaterConsumed -= 10;
        if (randInt(100) <= 50) {
          rp.water += 4;
          this.addLog(rp.name + '进入落雨状态，获得4点水源');
        }
      }
    }
    renderAll();

    this._execPair(function(gameOver) {
      if (gameOver) { self.isExecuting = false; return; }

      if (self._checkHP()) { self.isExecuting = false; return; }
      self._drawForBoth();
      self._gatherForBoth();
      self.bossUseCards();

      self.roundCount++;
      self.isExecuting = false;
      renderAll();
    });
  },

  _execPair: function(done) {
    var self = this;

    // --- try player ---
    var pOk = false;
    if (!this.player.hasBuff("藏匿") && this.player.skillQueue.length > 0) {
      pOk = this._tryOne(this.player, this.boss);
    }
    if (this.player.hp <= 0 || this.boss.hp <= 0) {
      this._checkHP(); this.isExecuting = false; done(true); return;
    }

    // --- try boss ---
    var bOk = false;
    if (!this.boss.hasBuff("藏匿") && this.boss.skillQueue.length > 0) {
      bOk = this._tryOne(this.boss, this.player);
    }
    if (this.player.hp <= 0 || this.boss.hp <= 0) {
      this._checkHP(); this.isExecuting = false; done(true); return;
    }

    // --- both failed ---
    if (!pOk && !bOk) {
      for (var i = 0; i < this.player.skillQueue.length; i++) this.player.skillQueue[i].stayRound++;
      for (var j = 0; j < this.boss.skillQueue.length; j++) this.boss.skillQueue[j].stayRound++;
      done(false);
      return;
    }

    setTimeout(function() { self._execPair(done); }, 300);
  },

  _tryOne: function(actor, enemy) {
    var skill = actor.skillQueue[0];
    if (skill.isPassive) { actor.skillQueue.shift(); return true; }
    if (!actor.isResEnough(skill)) return false;

    var eHpBefore = enemy.hp, pHpBefore = actor.hp;
    var consumed = actor.consumeResourcesExact(skill);

    var parts = [];
    if (skill.vegCost > 0) parts.push(skill.vegCost + '点素食');
    if (skill.meatCost > 0) parts.push(skill.meatCost + '点肉食');
    if (skill.waterCost > 0) parts.push(skill.waterCost + '点水源');
    if (parts.length > 0) this.addLog(actor.name + '使用' + skill.name + '，消耗了：' + parts.join(' '));
    else this.addLog(actor.name + '使用了' + skill.name);

    var ctx = { addLog: function(str) { game.addLog(str); } };
    skill.exec(actor, enemy, ctx);
    if (skill.logDesc) this.addLog(skill.logDesc);

    var dmg = Math.max(0, eHpBefore - enemy.hp);
    var heal = Math.max(0, actor.hp - pHpBefore);
    actor.recordStats(skill, dmg, heal, consumed.vUsed, consumed.mUsed, consumed.wUsed);

    var bf = document.getElementById("battlefield");
    if (dmg > 0) showFloatingNumber(bf, enemy === this.boss ? "right" : "left", "-" + dmg, "damage");
    if (heal > 0) showFloatingNumber(bf, actor === this.player ? "left" : "right", "+" + heal, "heal");

    actor.skillQueue.shift();
    renderAll();
    return true;
  },

  bossUseCards: function() {
    this.boss.useCards();
    renderAll();
  },

  _checkHP: function() {
    var victims = [this.player, this.boss];
    for (var i = 0; i < victims.length; i++) {
      if (victims[i].hp <= 0) {
        this.addLog(victims[i].name + '体力不支，战斗结束！');
        this.isOver = true;
        showStatsModal();
        renderAll();
        return true;
      }
    }
    return false;
  },

  _buffTick: function() {
    var entities = [this.player, this.boss];
    for (var ei = 0; ei < entities.length; ei++) {
      var p = entities[ei];
      for (var i = 0; i < p.buffs.length; i++) p.buffs[i].lastRound--;
      p.buffs = p.buffs.filter(function(b) { return b.lastRound > 0 || b.isPermanent; });
      for (var j = 0; j < p.debuffs.length; j++) p.debuffs[j].lastRound--;
      p.debuffs = p.debuffs.filter(function(b) { return b.lastRound > 0 || b.isPermanent; });
    }
  },

  _drawForBoth: function() {
    var entities = [this.player, this.boss];
    for (var ei = 0; ei < entities.length; ei++) {
      var p = entities[ei];
      var cards = 4;
      for (var i = 0; i < p.buffs.length; i++) cards = p.buffs[i].drawCardBuffEffect(cards);
      for (var j = 0; j < p.debuffs.length; j++) cards = p.debuffs[j].drawCardBuffEffect(cards);
      if (p.companionActive) cards += Math.floor(p.companionCount / 5);
      cards = Math.max(1, cards);
      for (var k = 0; k < cards; k++) p.drawCard();
      if (!p.isBoss) this.addLog(p.name + '抽了' + cards + '张牌');
      else this.addLog(p.name + '补充了' + cards + '张牌');
    }
  },

  _gatherForBoth: function() {
    this.player.getResources();
    this.boss.getResources();
    this.addLog(this.player.name + '收获了资源');
    this.addLog(this.boss.name + '收获了资源');
  },

  queuedForPlayer: function(player) {
    return player.skillQueue.length;
  },

  addLog: function(str) {
    this.log.push(str);
    var logEl = document.getElementById("battle-log");
    if (!logEl) return;
    var cls = "system";
    if (str.indexOf("玩家") !== -1) cls = "player";
    else if (game.boss && str.indexOf(game.boss.name) !== -1) cls = "boss";
    var div = document.createElement("div");
    div.className = "log-entry " + cls;
    div.textContent = str;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  },

  saveGame: function() {
    var data = {
      roundCount: this.roundCount,
      log: this.log.slice(),
      p: this._collectPlayer(this.player),
      b: this._collectPlayer(this.boss),
      rm: {
        p1: this.player.skillQueue.map(function(s) { return { n: s.name, sr: s.stayRound, sc: s.sourceCardName }; }),
        p2: this.boss.skillQueue.map(function(s) { return { n: s.name, sr: s.stayRound, sc: s.sourceCardName }; })
      }
    };
    localStorage.setItem("h5game_save", JSON.stringify(data));
    toast("游戏已保存");
  },

  loadGame: function() {
    var raw = localStorage.getItem("h5game_save");
    if (!raw) { toast("没有找到存档"); return; }
    var data = JSON.parse(raw);
    this.roundCount = data.roundCount;
    this.log = data.log.slice();
    this.isOver = false;

    this.player = this._restorePlayer(data.p, false);
    this.boss = this._restorePlayer(data.b, true);

    this.player.skillQueue = [];
    for (var i = 0; i < data.rm.p1.length; i++) {
      var s = data.rm.p1[i];
      var skill = this._createSkill(s.n, s.sc);
      if (skill) { skill.stayRound = s.sr; this.player.skillQueue.push(skill); }
    }
    this.boss.skillQueue = [];
    for (var j = 0; j < data.rm.p2.length; j++) {
      var s2 = data.rm.p2[j];
      var skill2 = this._createSkill(s2.n, s2.sc);
      if (skill2) { skill2.stayRound = s2.sr; this.boss.skillQueue.push(skill2); }
    }

    var logEl = document.getElementById("battle-log");
    if (logEl) {
      logEl.innerHTML = "";
      for (var li = 0; li < this.log.length; li++) {
        var l = this.log[li];
        var cls = "system";
        if (l.indexOf("玩家") !== -1) cls = "player";
        else if (game.boss && l.indexOf(game.boss.name) !== -1) cls = "boss";
        var div = document.createElement("div");
        div.className = "log-entry " + cls;
        div.textContent = l;
        logEl.appendChild(div);
      }
    }
    renderAll();
    switchPanel("battle");
    if (this.player.cardList.length === 0) {
      this.nextRound();
    }
    toast("游戏已加载");
  },

  _collectPlayer: function(p) {
    return {
      hp: p.hp, mxhp: p.max_hp,
      veg: p.vegetarian, vlv: p.vegetarian_level, vexp: p.vegetarian_exp,
      meat: p.meat, mlv: p.meat_level, mexp: p.meat_exp,
      wt: p.water, wlv: p.water_level, wexp: p.water_exp,
      crt: p.criticalRate, crD: p.criticalDamage, def: p.defendRate,
      moon: p.moonPhase,
      vegInd: p.vegIndicator, vegIndActive: p.vegIndicatorActive,
      bossClass: p instanceof MantisBoss ? "MantisBoss" : "SmallSnowMan",
      types: p.cardTypeList.slice(),
      stack: p.cardStack.map(function(c) { return c.id; }),
      used: p.usedCardStack.map(function(c) { return c.id; }),
      hand: p.cardList.map(function(c) { return c.id; }),
      buffs: p.buffs.map(function(b) { return { name: b.name, isBuff: true, lr: b.lastRound, perm: b.isPermanent, ph: b.phase }; }),
      debuffs: p.debuffs.map(function(b) { return { name: b.name, isBuff: false, lr: b.lastRound, perm: b.isPermanent }; })
    };
  },

  _restorePlayer: function(d, isBoss) {
    var bossName = d.bossClass === "MantisBoss" ? "【芒种】时序螳螂" : "【小雪】小小雪人";
    var p;
    if (isBoss && d.bossClass === "MantisBoss") {
      p = new MantisBoss(bossName, d.mxhp);
    } else if (isBoss) {
      p = new SmallSnowMan(bossName, d.mxhp);
    } else {
      p = new Player("玩家", false, d.mxhp);
    }
    p._hp = d.hp;
    p.max_hp = d.mxhp;
    p._veg = d.veg; p._vegExp = d.vexp;
    p.vegetarian_level = d.vlv;
    p._meat = d.meat; p._meatExp = d.mexp;
    p.meat_level = d.mlv;
    p._wat = d.wt; p._waterExp = d.wexp;
    p.water_level = d.wlv;
    p._critR = d.crt; p._critD = d.crD; p._defR = d.def;
    p.vegIndicator = d.vegInd || 0;
    p.vegIndicatorActive = d.vegIndActive || false;

    var allDefs = isBoss ? (d.bossClass === "MantisBoss" ? MANTIS_BOSS_CARDS : ALL_BOSS_CARDS) : ALL_PLAYER_CARDS;
    var defById = {};
    for (var i = 0; i < allDefs.length; i++) defById[allDefs[i].id] = allDefs[i];

    p.cardTypeList = d.types.slice();
    p.cardStack = d.stack.map(function(id) { return defById[id] ? createCard(defById[id]) : null; }).filter(Boolean);
    p.usedCardStack = d.used.map(function(id) { return defById[id] ? createCard(defById[id]) : null; }).filter(Boolean);
    p.cardList = d.hand.map(function(id) { return defById[id] ? createCard(defById[id]) : null; }).filter(Boolean);

    for (var bi = 0; bi < d.buffs.length; bi++) {
      var bd = d.buffs[bi];
      var buff;
      if (bd.name === "月相") {
        buff = makeMoonPhaseBuff();
        buff.phase = bd.ph || 0;
        buff.description = ["新月", "上弦月", "满月", "下弦月"][buff.phase];
      } else {
        buff = makeBuff(bd.name, true, bd.lr, bd.name);
        if (bd.perm) buff.isPermanent = true;
      }
      p.buffs.push(buff);
    }
    for (var di = 0; di < d.debuffs.length; di++) {
      var dd = d.debuffs[di];
      var debuff = makeBuff(dd.name, false, dd.lr, dd.name);
      if (dd.perm) debuff.isPermanent = true;
      p.debuffs.push(debuff);
    }
    if (!isBoss) {
      game.selectedCards = ALL_PLAYER_CARDS.filter(function(def) {
        return d.types.indexOf(def.id) !== -1;
      });
    }
    return p;
  },

  _createSkill: function(name, cardName) {
    var fn = SKILL_DEFS[name];
    if (!fn) return null;
    var allDefs = ALL_PLAYER_CARDS.concat(ALL_BOSS_CARDS, MANTIS_BOSS_CARDS);
    var def = null;
    for (var i = 0; i < allDefs.length; i++) {
      if (allDefs[i].name === cardName) { def = allDefs[i]; break; }
    }
    var skill = fn(def ? (def.slaughterNum || 1) : 1, def ? (def.liquifyNum || 1) : 1);
    skill.sourceCardName = cardName;
    return skill;
  }
};

// ===== DECK BUILDER =====
var MIN_DECK_SIZE = 8;

var PRESETS = {
  qiqiao: { name: "基本乞巧体系", desc: "猛兽+乞巧组合，利用月相循环机制打出高额伤害", cards: ["老虎","猪","猎豹","乞巧族-猫长老","乞巧族-鼠力士","乞巧族-狐先知","乞巧族-月桂兔","乞巧族-金鱼圣女"] },
  chunhui: { name: "基本春晖体系1", desc: "发展农田积累素食，通过素食存储打出高额伤害", cards: ["猪","鸡","水牛","梅花鹿","鹰","松鸦","松鼠","老鼠"] },
  chunhui2: { name: "基本春晖体系2", desc: "将春晖体系1中的鸡换成乌龟，虽然发展农田的速度减缓，但是增强了一定的生存能力", cards: ["鹰","猪","乌龟","水牛","老鼠","梅花鹿","松鸦","松鼠"] }
};

var ARCH_MAP = { "猛兽": "mengshou", "春晖": "chunhui", "乞巧": "qiqiao", "通用": "tongyong", "玄妙": "xuanmiao", "遨游": "aoyou", "极寒": "jihan" };

function initDeckBuilder() {
  var grid = document.getElementById("deck-card-grid");

  var selectedNames = new Set();
  try {
    var saved = localStorage.getItem("h5game_deck");
    if (saved) {
      var arr = JSON.parse(saved);
      for (var i = 0; i < arr.length; i++) selectedNames.add(arr[i]);
    }
  } catch(e) {}

  function updateUI() {
    var b = document.getElementById("btn-start-game");
    var c = document.getElementById("deck-count");
    if (b) b.disabled = selectedNames.size < MIN_DECK_SIZE;
    if (c) c.textContent = selectedNames.size;
    try {
      var children = grid.children;
      for (var i = 0; i < children.length; i++) {
        var item = children[i];
        var name = item.dataset.cardName;
        if (!name) continue;
        if (selectedNames.has(name)) item.classList.add("selected");
        else item.classList.remove("selected");
        var cb = item.querySelector(".deck-card-checkbox");
        if (cb) cb.checked = selectedNames.has(name);
      }
    } catch(e) {}
  }

  document.getElementById("btn-start-game").addEventListener("click", function() {
    if (selectedNames.size < MIN_DECK_SIZE) {
      toast("请至少选择8张卡牌");
      return;
    }
    var cardDefs = ALL_PLAYER_CARDS.filter(function(d) { return selectedNames.has(d.name); });
    game.startGame(cardDefs);
  });

  grid.innerHTML = "";
  for (var di = 0; di < ALL_PLAYER_CARDS.length; di++) {
    var def = ALL_PLAYER_CARDS[di];

    var div = document.createElement("div");
    div.className = "deck-card-item";
    div.dataset.cardName = def.name;

    var nameRow = document.createElement("div");
    nameRow.className = "deck-card-name-row";

    // Archetype badge
    var archetypeName = def.archetype || "通用";
    var archParts = archetypeName.split(",");
    div.dataset.archetype = archetypeName;
    var archCodes = []; for (var ap=0; ap<archParts.length; ap++) archCodes.push(ARCH_MAP[archParts[ap]] || "tongyong");
    div.dataset.archCode = archCodes.join(" ");
    for (var ap2=0; ap2<archParts.length; ap2++) {
      var aName = archParts[ap2];
      var archBadge = document.createElement("span");
      archBadge.className = "deck-card-archetype-badge " + (aName === "猛兽" ? "mengshou" : aName === "春晖" ? "chunhui" : aName === "乞巧" ? "qiqiao" : aName === "玄妙" ? "xuanmiao" : aName === "遨游" ? "aoyou" : aName === "极寒" ? "jihan" : "tongyong");
      archBadge.textContent = aName;
      nameRow.appendChild(archBadge);
    }

    var nameEl = document.createElement("div");
    nameEl.className = "deck-card-name";
    nameEl.textContent = def.name;
    nameRow.appendChild(nameEl);

    var typeText = document.createElement("span");
    typeText.className = "deck-card-type-text " + def.type.toLowerCase();
    typeText.textContent = def.type === "LAND" ? "陆" : def.type === "SKY" ? "空" : "海";
    nameRow.appendChild(typeText);
    div.appendChild(nameRow);

    var skillsDiv = document.createElement("div");
    skillsDiv.className = "deck-card-skills";
    for (var sk = 0; sk < def.skills.length; sk++) {
      var skillName = def.skills[sk];
      var sd = SKILL_DEFS[skillName] && SKILL_DEFS[skillName](def.slaughterNum||1, def.liquifyNum||1);
      var costStr = "";
      if (sd.vegCost) costStr += "🌿" + sd.vegCost;
      if (sd.meatCost) costStr += "🥩" + sd.meatCost;
      if (sd.waterCost) costStr += "💧" + sd.waterCost;
      if (!sd.vegCost && !sd.meatCost && !sd.waterCost) costStr = "免费";

      var row = document.createElement("div");
      row.style.marginBottom = "3px";
      row.innerHTML = '<span style="font-weight:600;color:#e0d7c6">' + skillName + '</span> <span class="deck-skill-cost">' + costStr + '</span>' +
        '<div class="deck-skill-detail">' + (sd.desc || '') + '</div>';
      skillsDiv.appendChild(row);
    }
    // Add slaughter row
    var slaughterRow = document.createElement("div");
    slaughterRow.style.marginTop = "2px";
    slaughterRow.innerHTML = '<span style="font-weight:600;color:#e8b86d">屠宰</span> <span class="deck-skill-cost">🥩' + def.slaughterNum + '</span>' +
      '<div class="deck-skill-detail">废弃此牌，获得' + def.slaughterNum + '点肉食</div>';
    skillsDiv.appendChild(slaughterRow);

    div.appendChild(skillsDiv);

    var cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "deck-card-checkbox";

    div.appendChild(cb);

    (function(defName) {
      div.addEventListener("click", function(e) {
        e.stopPropagation();
        if (e.target.tagName === "INPUT") return;
        if (selectedNames.has(defName)) selectedNames.delete(defName);
        else selectedNames.add(defName);
        var names = []; selectedNames.forEach(function(v) { names.push(v); });
        localStorage.setItem("h5game_deck", JSON.stringify(names));
        updateUI();
      });

      cb.addEventListener("change", function(e) {
        e.stopPropagation();
        if (cb.checked) selectedNames.add(defName);
        else selectedNames.delete(defName);
        var names = []; selectedNames.forEach(function(v) { names.push(v); });
        localStorage.setItem("h5game_deck", JSON.stringify(names));
        updateUI();
      });
    })(def.name);

    grid.appendChild(div);
  }

  updateUI();

  var presetContainer = document.getElementById("deck-presets");
  presetContainer.innerHTML = '<div class="preset-title">推荐卡组</div>';
  var keys = Object.keys(PRESETS);
  for (var ki = 0; ki < keys.length; ki++) {
    var pk = keys[ki];
    var p = PRESETS[pk];
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "preset-btn";
    btn.dataset.preset = pk;
    btn.innerHTML = '<span class="preset-name">' + p.name + '</span><span class="preset-count">' + p.cards.length + '张</span><span class="preset-desc">' + p.desc + '</span>';
    presetContainer.appendChild(btn);
  }

  presetContainer.addEventListener("click", function(e) {
    var target = e.target.closest(".preset-btn");
    if (!target) return;
    e.stopPropagation();
    var key = target.dataset.preset;
    var p = PRESETS[key];
    if (!p) return;
    selectedNames.clear();
    for (var pn = 0; pn < p.cards.length; pn++) selectedNames.add(p.cards[pn]);
    var pnames = []; selectedNames.forEach(function(v) { pnames.push(v); });
    localStorage.setItem("h5game_deck", JSON.stringify(pnames));
    updateUI();
  });

  }

function applyDeckFilter(btn) {
  var wasActive = btn.classList.contains("active");
  var allBtns = document.getElementById("deck-filter-bar").querySelectorAll(".filter-btn");
  for (var abi = 0; abi < allBtns.length; abi++) allBtns[abi].classList.remove("active");
  var gridItems = document.getElementById("deck-card-grid").querySelectorAll(".deck-card-item");
  if (wasActive) {
    for (var gi = 0; gi < gridItems.length; gi++) gridItems[gi].style.display = "";
  } else {
    btn.classList.add("active");
    var f = btn.dataset.filter;
    for (var gk = 0; gk < gridItems.length; gk++) {
      gridItems[gk].style.display = gridItems[gk].dataset.archCode.indexOf(f) !== -1 ? "" : "none";
    }
  }
}

// ===== UI RENDERER =====
function getBuffIcon(buff) {
  if (buff.name === "月相") return ["🌑","🌓","🌕","🌗"][buff.phase || 0];
  if (buff.name.indexOf("捣药-攻") !== -1) return "⚔️";
  if (buff.name.indexOf("捣药-防") !== -1) return "🛡️";
  if (buff.name.indexOf("捣药-牌") !== -1) return "🀄";
  if (buff.name.indexOf("繁盛") !== -1) return "💚";
  if (buff.name.indexOf("横行") !== -1) return "🦞";
  if (buff.name.indexOf("自在") !== -1) return "😌";
  if (buff.name.indexOf("锐利") !== -1) return "👁️";
  if (buff.name.indexOf("洞若观火") !== -1) return "🔎";
  if (buff.name.indexOf("藏匿") !== -1) return "🙈";
  if (buff.name.indexOf("鹰击长空") !== -1 && buff.isBuff) return "🦅";
  if (buff.name.indexOf("鹰击长空") !== -1 && !buff.isBuff) return "🪶";
  if (buff.name.indexOf("寒冰塑体") !== -1) return "🧊";
  if (buff.name.indexOf("燕归巢") !== -1) return "🐦";
  if (buff.name.indexOf("寒气逼人") !== -1) return "❄️";
  if (buff.name.indexOf("啃咬") !== -1) return "🦷";
  if (buff.name.indexOf("优雅") !== -1) return "💅";
  if (buff.name.indexOf("蛮力") !== -1) return "💪";
  if (buff.name.indexOf("技能消耗") !== -1) return "😫";
  return buff.isBuff ? "⬆️" : "⬇️";
}

function renderAll() {
  renderBattlePanel();
}

function renderBattlePanel() {
  var panel = document.getElementById("panel-battle");
  if (!panel || !panel.classList.contains("active")) return;
  if (!game.player) return;
  renderPlayerStats(document.getElementById("panel-player"), game.player, false);
  renderPlayerStats(document.getElementById("panel-boss"), game.boss, true);
  var bossLabel = document.getElementById("boss-avatar-label");
  if (bossLabel && game.boss) bossLabel.textContent = game.boss.name;
  renderHandCards();
}

    var b = player.buffs[i];
    buffsHtml += '<div class="buff-icon">' + getBuffIcon(b) + '<span class="tooltip">' + b.name + ' - ' + b.description + (b.isPermanent ? '' : ' (' + b.lastRound + '回合)') + '</span></div>';
  }
  var debuffsHtml = "";
  for (var j = 0; j < player.debuffs.length; j++) {
    var db = player.debuffs[j];

    '</div>' +

      '<span class="hp-label">生命值 HP</span>' +
      '<div class="hp-bar-outer"><div class="hp-bar-inner" style="width:' + hpPct + '%"></div></div>' +
      '<span class="hp-text">' + player.hp + ' / ' + player.max_hp + '</span>' +
    '</div>' +
    '<div class="resource-stats">' +
      '<div class="resource-item"><div class="resource-row"><span class="label">🌿 Lv.' + player.vegetarian_level + '</span><span class="value-amount">' + player.vegetarian + '</span></div>' +
      '<div class="mini-bar exp-bar"><div class="mini-bar-fill" style="width:' + vegExpPct + '%"></div><span class="mini-bar-text">' + player.vegetarian_exp + '/' + vegTh + '</span></div></div>' +
      '<div class="resource-item"><div class="resource-row"><span class="label">🥩 Lv.' + player.meat_level + '</span><span class="value-amount">' + player.meat + '</span></div>' +
      '<div class="mini-bar exp-bar"><div class="mini-bar-fill" style="width:' + meatExpPct + '%"></div><span class="mini-bar-text">' + player.meat_exp + '/' + meatTh + '</span></div></div>' +
      '<div class="resource-item"><div class="resource-row"><span class="label">💧 Lv.' + player.water_level + '</span><span class="value-amount">' + player.water + '</span></div>' +
      '<div class="mini-bar exp-bar"><div class="mini-bar-fill" style="width:' + waterExpPct + '%"></div><span class="mini-bar-text">' + player.water_exp + '/' + waterTh + '</span></div></div>' +
      '<div class="resource-item"><div class="resource-row"><span class="label">暴击率</span><span class="value crit">' + player.criticalRate + '%</span></div>' +

      '<div class="resource-item"><div class="resource-row"><span class="label">抵挡率</span><span class="value defend">' + player.defendRate + '%</span></div>' +
